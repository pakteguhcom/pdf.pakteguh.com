<style>
  html, body { background: #0A0A0A; color: #FAFAFA; font-family: 'Inter', system-ui, sans-serif; }
  * { transition: background-color .2s ease-out, color .2s ease-out, border-color .2s ease-out, transform .2s ease-out, opacity .2s ease-out, box-shadow .2s ease-out; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #262626; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #333; }
  .btn-primary { background:#3B82F6; color:white; }
  .btn-primary:hover:not(:disabled) { background:#2563EB; transform: translateY(-1px); box-shadow: 0 8px 24px -8px rgba(59,130,246,.55); }
  .btn-primary:disabled { opacity:.4; cursor:not-allowed; }
  .btn-ghost { background:transparent; color:#FAFAFA; border:1px solid #262626; }
  .btn-ghost:hover { background:#171717; border-color:#333; }
  .card { background:#171717; border:1px solid #262626; border-radius:12px; }
  .card:hover { border-color:#333; }
  .dropzone { border:2px dashed #262626; border-radius:12px; background:#111; }
  .dropzone.drag { border-color:#3B82F6; background: rgba(59,130,246,.06); }
  .nav-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:10px; color:#A3A3A3; border-left:2px solid transparent; cursor:pointer; font-size:14px; font-weight:500; }
  .nav-item:hover { background:#171717; color:#FAFAFA; }
  .nav-item.active { background:#171717; color:#FAFAFA; border-left-color:#3B82F6; }
  .thumb { background:#0f0f0f; border:1px solid #262626; border-radius:10px; overflow:hidden; position:relative; }
  .thumb.selected { border-color:#3B82F6; box-shadow:0 0 0 2px rgba(59,130,246,.35); }
  .thumb canvas { display:block; width:100%; height:auto; }
  .badge { position:absolute; top:6px; right:6px; background:#3B82F6; color:white; font-size:11px; padding:2px 6px; border-radius:6px; font-weight:600; }
  .check-overlay { position:absolute; inset:0; background:rgba(59,130,246,.18); display:flex; align-items:center; justify-content:center; }
  .check-overlay svg { background:#3B82F6; border-radius:9999px; padding:4px; width:28px; height:28px; color:white; }
  .toast { animation: slideIn .25s ease-out; }
  @keyframes slideIn { from { transform: translateX(20px); opacity:0; } to { transform: translateX(0); opacity:1; } }
  .spinner { width:36px; height:36px; border:3px solid #262626; border-top-color:#3B82F6; border-radius:9999px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success-check { width:56px; height:56px; border-radius:9999px; background:rgba(34,197,94,.15); color:#22C55E; display:flex; align-items:center; justify-content:center; animation: pop .4s ease-out; }
  @keyframes pop { 0% { transform:scale(.6); opacity:0;} 100% { transform:scale(1); opacity:1; } }
  input[type="range"] { -webkit-appearance:none; height:4px; background:#262626; border-radius:9999px; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; background:#3B82F6; border-radius:9999px; cursor:pointer; border:2px solid #0A0A0A; }
  input[type="color"] { background:transparent; border:1px solid #262626; border-radius:8px; width:44px; height:36px; padding:2px; cursor:pointer; }
  select, input[type="text"], input[type="number"] { background:#0f0f0f; border:1px solid #262626; border-radius:10px; padding:9px 12px; color:#FAFAFA; font-size:14px; outline:none; }
  select:focus, input:focus { border-color:#3B82F6; }
  .chip { padding:8px 14px; border-radius:10px; font-size:13px; font-weight:500; background:#0f0f0f; border:1px solid #262626; color:#A3A3A3; cursor:pointer; }
  .chip:hover { color:#FAFAFA; border-color:#333; }
  .chip.active { background:#3B82F6; color:white; border-color:#3B82F6; }
  .pos-cell { aspect-ratio:1/1; border:1px solid #262626; border-radius:8px; cursor:pointer; background:#0f0f0f; }
  .pos-cell:hover { border-color:#333; }
  .pos-cell.active { background:#3B82F6; border-color:#3B82F6; }
  .drag-handle { cursor:grab; }
  .drag-handle:active { cursor:grabbing; }
  .row-item.dragging { opacity:.4; }
  .row-item.drop-target { border-top:2px solid #3B82F6; }
  /* Editor */
  .edit-stage { position:relative; background:#0f0f0f; border:1px solid #262626; border-radius:12px; overflow:hidden; }
  .edit-stage canvas { display:block; }
  .edit-overlay { position:absolute; inset:0; }
  .edit-tool-btn { display:flex; align-items:center; gap:6px; padding:8px 10px; border-radius:8px; font-size:12px; font-weight:500; background:#0f0f0f; border:1px solid #262626; color:#A3A3A3; cursor:pointer; }
  .edit-tool-btn:hover { color:#FAFAFA; border-color:#333; }
  .edit-tool-btn.active { background:#3B82F6; border-color:#3B82F6; color:white; }
  .edit-page-thumb { border:2px solid transparent; border-radius:8px; cursor:pointer; padding:4px; background:#0f0f0f; position:relative; }
  .edit-page-thumb.active { border-color:#3B82F6; }
  .edit-page-thumb canvas { display:block; width:100%; height:auto; border-radius:4px; }
  .edit-page-thumb .num { position:absolute; bottom:6px; left:6px; background:rgba(0,0,0,.7); color:white; font-size:10px; padding:1px 5px; border-radius:4px; }
  .anno { position:absolute; box-sizing:border-box; }
  .anno.selected { outline:2px dashed #3B82F6; outline-offset:2px; }
  .anno-text { cursor:move; padding:2px 4px; white-space:pre; line-height:1.15; }
  .anno-img { cursor:move; }
  .anno-img img { width:100%; height:100%; display:block; pointer-events:none; }
  .anno-handle { position:absolute; right:-6px; bottom:-6px; width:12px; height:12px; background:#3B82F6; border:2px solid white; border-radius:2px; cursor:se-resize; }
  .anno-close { position:absolute; top:-10px; right:-10px; width:20px; height:20px; background:#EF4444; color:white; border-radius:9999px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; border:2px solid #0A0A0A; }
  .edit-grid { display:grid; gap:16px; grid-template-columns: 140px 1fr 260px; align-items:start; }
  @media (max-width: 1023px) {
    .edit-grid { grid-template-columns: 110px 1fr; }
    .edit-grid > .edit-inspector { grid-column: 1 / -1; }
  }
  /* Mobile top bar (hidden on desktop) */
  .mobile-topbar { display:none; }
  .mobile-backdrop { display:none; }
  @media (max-width: 899px) {
    .mobile-topbar {
      display:flex; align-items:center; gap:12px;
      position:sticky; top:0; z-index:45;
      padding:12px 16px;
      background:rgba(10,10,10,.85);
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid #1f1f1f;
    }
    .mobile-menu-btn {
      width:40px; height:40px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      background:#171717; border:1px solid #262626; color:#FAFAFA;
      cursor:pointer; flex-shrink:0;
    }
    .mobile-menu-btn:active { transform:scale(.94); background:#1f1f1f; }
    .mobile-brand {
      display:flex; align-items:center; gap:10px; min-width:0;
    }
    .mobile-brand .logo {
      width:36px; height:36px; border-radius:10px; flex-shrink:0;
      background:linear-gradient(135deg,#3B82F6,#60A5FA);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 12px -2px rgba(59,130,246,.5);
    }
    .mobile-brand .name { font-size:15px; font-weight:600; letter-spacing:-.01em; }
    .mobile-brand .sub { font-size:10px; color:#737373; margin-top:-2px; }

    /* Sidebar becomes slide-in drawer */
    .sidebar {
      position:fixed; top:0; left:0; bottom:0;
      width:min(320px, 86vw); height:100dvh;
      z-index:60; padding:20px 16px 24px;
      background:rgba(15,15,15,.98);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-right:1px solid #262626;
      transform:translateX(-105%);
      transition:transform .3s cubic-bezier(.4,0,.2,1);
      overflow-y:auto; -webkit-overflow-scrolling:touch;
      box-shadow:20px 0 60px -20px rgba(0,0,0,.6);
    }
    .sidebar.open { transform:translateX(0); }
    .mobile-backdrop {
      display:block; position:fixed; inset:0; z-index:55;
      background:rgba(0,0,0,.55); backdrop-filter:blur(2px);
      opacity:0; pointer-events:none;
      transition:opacity .3s ease;
    }
    .mobile-backdrop.open { opacity:1; pointer-events:auto; }

    /* Drawer nav = 2-col tile grid */
    .sidebar-nav {
      display:grid !important; grid-template-columns:1fr 1fr; gap:8px;
      margin-top:4px;
    }
    .nav-item {
      flex-direction:column; align-items:center; justify-content:center;
      gap:8px; padding:16px 8px; min-height:88px;
      border-left:none !important;
      background:#131313; border:1px solid #1f1f1f; border-radius:14px;
      text-align:center; font-size:12px; color:#A3A3A3;
    }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active {
      background:linear-gradient(160deg, rgba(59,130,246,.18), rgba(59,130,246,.06));
      border-color:rgba(59,130,246,.55);
      color:#FAFAFA;
      box-shadow:0 6px 20px -8px rgba(59,130,246,.5);
    }
    .nav-item.active svg { color:#60A5FA; }

    /* Desktop header hidden on mobile — use topbar */
    header.desktop-header { display:none; }
    /* Mobile page header inside main */
    .mobile-page-head { padding:18px 18px 8px; }
    .mobile-page-head h1 { font-size:22px; font-weight:600; letter-spacing:-.02em; }
    .mobile-page-head p { font-size:13px; color:#A3A3A3; margin-top:4px; line-height:1.4; }
    section#view { padding:14px 16px 32px !important; }

    .edit-grid { grid-template-columns: 1fr; }
    .edit-grid > .edit-thumbs { max-height:120px !important; flex-direction:row !important; overflow-x:auto; overflow-y:hidden; padding-bottom:4px; }
    .edit-grid > .edit-thumbs .edit-page-thumb { flex-shrink:0; width:90px; }
    .edit-tool-btn span { display:none; }
    .edit-tool-btn { padding:10px; }
    input[type="color"] { width:38px; height:32px; }
    .card { border-radius:12px; }
    .toast { max-width: calc(100vw - 32px); }
    #toasts { left:16px; right:16px; max-width:none; top:auto; bottom:16px; }

    #install-btn { width:100%; margin-top:20px !important; padding:14px !important; font-size:14px !important; border-radius:12px !important; }
  }
  @media (max-width: 480px) {
    .dropzone { padding:28px 16px !important; }
    .sidebar-nav { grid-template-columns:1fr 1fr; }
  }
  @media (min-width: 900px) {
    .mobile-page-head { display:none; }
  }
</style>

<div class="mobile-backdrop" id="backdrop"></div>

<div class="flex min-h-screen">

  <aside class="sidebar w-[240px] shrink-0 border-r border-brd bg-bg p-5 flex flex-col gap-6">

      <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#3B82F6,#60A5FA);box-shadow:0 4px 14px -2px rgba(59,130,246,.5);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      </div>
      <div>
        <div class="text-[15px] font-semibold tracking-tight">PDF Toolkit</div>

  </aside>

  <!-- Main -->
  <main class="main flex-1 min-w-0">
    <header class="desktop-header sticky top-0 z-30 bg-bg/80 backdrop-blur border-b border-brd px-6 md:px-10 py-6">
      <h1 id="tool-title" class="text-[28px] md:text-[32px] font-semibold tracking-tight leading-tight">Merge PDF</h1>
      <p id="tool-desc" class="text-muted text-[15px] mt-1">Combine multiple PDFs into one document.</p>
    </header>
    <div class="mobile-page-head">
      <h1 id="tool-title-m">Merge PDF</h1>
      <p id="tool-desc-m">Combine multiple PDFs into one document.</p>
    </div>
    <section id="view" class="px-6 md:px-10 py-8"></section>
  </main>
</div>

<script>
  // Mobile drawer toggle
  (function(){
    const btn = document.getElementById('menu-btn');
    const bd  = document.getElementById('backdrop');
    const sb  = document.querySelector('aside.sidebar');
    function close(){ sb.classList.remove('open'); bd.classList.remove('open'); }
    function open(){ sb.classList.add('open'); bd.classList.add('open'); }
    btn?.addEventListener('click', ()=> sb.classList.contains('open') ? close() : open());
    bd?.addEventListener('click', close);
    // Close after picking a tool
    document.addEventListener('click', (e)=>{
      if (e.target.closest && e.target.closest('.nav-item') && window.matchMedia('(max-width:899px)').matches) {
        setTimeout(close, 60);
      }
    });
    window.addEventListener('resize', ()=>{ if (window.innerWidth >= 900) close(); });
  })();
</script>

/* ===== Toast ===== */
const toastEl = document.getElementById('toasts');
function toast(msg, kind='info') {
  const colors = { info:'border-brd bg-surface', success:'border-green-800 bg-green-950/70', error:'border-red-900 bg-red-950/70' };
  const el = document.createElement('div');
  el.className = `toast border ${colors[kind]} text-sm px-4 py-3 rounded-xl shadow-xl flex items-start gap-2`;
  el.innerHTML = `<span class="mt-0.5">${kind==='error'?'⚠️':kind==='success'?'✓':'ℹ'}</span><div class="flex-1">${msg}</div>`;
  toastEl.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(20px)'; setTimeout(()=>el.remove(),250); }, 3500);
}

/* ===== Utils ===== */
const fmtBytes = b => {
  if (!b) return '0 B';
  const u = ['B','KB','MB','GB']; let i=0; while (b>=1024 && i<u.length-1){b/=1024;i++;}
  return b.toFixed(b>=10?0:1)+' '+u[i];
};
const MAX = 50 * 1024 * 1024;
function validatePdf(f) {
  if (!f) return 'No file selected';
  if (!/\.pdf$/i.test(f.name) && f.type !== 'application/pdf') return 'Please choose a PDF file';
  if (f.size > MAX) return 'File exceeds 50 MB limit';
  return null;
}
function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

/* Render thumbnail via pdf.js */
async function renderThumb(pdfDoc, pageIndex, width=180) {
  const page = await pdfDoc.getPage(pageIndex+1);
  const vp1 = page.getViewport({ scale: 1 });
  const scale = width / vp1.width;
  const vp = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width = vp.width; canvas.height = vp.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  return canvas;
}
async function loadPdfJs(buf) {
  return await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
}

/* ===== Common UI ===== */
function dropzone({ multiple=false, accept='application/pdf', onFiles, hint='Drop PDF here or click to browse', sub='Maximum 50 MB per file' }) {
  const el = document.createElement('label');
  el.className = 'dropzone flex flex-col items-center justify-center text-center py-16 px-6 cursor-pointer hover:border-brd2';
  el.innerHTML = `
    <div class="text-muted mb-4">${icons.upload}</div>
    <div class="text-[15px] font-medium">${hint}</div>
    <div class="text-[13px] text-muted mt-1">${sub}</div>
    <input type="file" class="hidden" ${multiple?'multiple':''} accept="${accept}"/>
  `;
  const input = el.querySelector('input');
  input.onchange = () => { if (input.files.length) onFiles([...input.files]); input.value=''; };
  ['dragenter','dragover'].forEach(ev => el.addEventListener(ev, e => { e.preventDefault(); el.classList.add('drag'); }));
  ['dragleave','drop'].forEach(ev => el.addEventListener(ev, e => { e.preventDefault(); el.classList.remove('drag'); }));
  el.addEventListener('drop', e => {
    const files = [...e.dataTransfer.files];
    if (files.length) onFiles(multiple?files:[files[0]]);
  });
  return el;
}

function processingPanel(text='Processing…') {
  const wrap = document.createElement('div');
  wrap.className = 'card p-10 flex flex-col items-center justify-center text-center';
  wrap.innerHTML = `<div class="spinner mb-4"></div><div id="proc-text" class="text-sm text-muted">${text}</div>`;
  return wrap;
}
function successPanel({ message='Done', filename, blob, onReset }) {
  const wrap = document.createElement('div');
  wrap.className = 'card p-10 flex flex-col items-center text-center';
  wrap.innerHTML = `
    <div class="success-check mb-4"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div class="text-lg font-semibold">${message}</div>
    <div class="text-sm text-muted mt-1">${filename} · ${fmtBytes(blob.size)}</div>
    <div class="flex gap-2 mt-6">
      <button id="dl" class="btn-primary px-5 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2">${icons.download} Download</button>
      <button id="rs" class="btn-ghost px-5 py-2.5 rounded-xl text-sm font-medium">Start over</button>
    </div>`;
  wrap.querySelector('#dl').onclick = () => downloadBlob(blob, filename);
  wrap.querySelector('#rs').onclick = onReset;
  // auto-trigger first download
  setTimeout(()=>downloadBlob(blob, filename), 150);
  return wrap;
}
function fileMeta(name, size, pages) {
  const el = document.createElement('div');
  el.className = 'flex flex-wrap items-center gap-3 text-[13px] text-muted mb-4';
  el.innerHTML = `<div class="px-3 py-1.5 rounded-lg bg-surface border border-brd text-fg font-medium">${name}</div>
    <div>${fmtBytes(size)}</div><div>•</div><div>${pages} page${pages===1?'':'s'}</div>`;
  return el;
}

/* Reusable drag-drop reorder for a list container */
function enableReorder(container, itemSelector, onReorder) {
  let dragEl = null;
  container.querySelectorAll(itemSelector).forEach(el => {
    el.draggable = true;
    el.addEventListener('dragstart', e => { dragEl = el; el.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    el.addEventListener('dragend', () => { el.classList.remove('dragging'); container.querySelectorAll(itemSelector).forEach(x=>x.classList.remove('drop-target')); });
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drop-target'); });
    el.addEventListener('dragleave', () => el.classList.remove('drop-target'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('drop-target');
      if (!dragEl || dragEl === el) return;
      const items = [...container.querySelectorAll(itemSelector)];
      const from = items.indexOf(dragEl), to = items.indexOf(el);
      onReorder(from, to);
    });
  });
}

/* ---------- MERGE ---------- */
function renderMerge() {
  const state = { files: [] }; // {file, thumb, name, size}
  const root = document.createElement('div'); root.className = 'flex flex-col gap-6'; view.appendChild(root);
  const dz = dropzone({ multiple:true, onFiles: async files => {
    for (const f of files) {
      const err = validatePdf(f); if (err) { toast(err,'error'); continue; }
      try {
        const buf = await f.arrayBuffer();
        const pdf = await loadPdfJs(buf);
        const thumb = await renderThumb(pdf, 0, 120);
        state.files.push({ file:f, buf, thumb, name:f.name, size:f.size, pages: pdf.numPages });
      } catch { toast('Could not read '+f.name,'error'); }
    }
    render();
  }});
  const list = document.createElement('div'); list.className = 'flex flex-col gap-2';
  const actions = document.createElement('div'); actions.className='flex items-center justify-between';
  root.appendChild(dz); root.appendChild(list); root.appendChild(actions);

  function render() {
    list.innerHTML = '';
    state.files.forEach((it, i) => {
      const row = document.createElement('div');
      row.className = 'row-item card p-3 flex items-center gap-3';
      row.appendChild(it.thumb); it.thumb.style.width='42px'; it.thumb.style.height='auto'; it.thumb.style.borderRadius='6px';
      row.insertAdjacentHTML('beforeend',`
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium truncate">${it.name}</div>
          <div class="text-[12px] text-muted">${fmtBytes(it.size)} · ${it.pages} pages</div>
        </div>
        <div class="drag-handle text-muted hover:text-fg p-2">${icons.grip}</div>
        <button class="rm text-muted hover:text-red-400 p-2">${icons.trash}</button>`);
      row.querySelector('.rm').onclick = () => { state.files.splice(i,1); render(); };
      list.appendChild(row);
    });
    enableReorder(list, '.row-item', (from,to)=>{ const [m]=state.files.splice(from,1); state.files.splice(to,0,m); render(); });
    actions.innerHTML = '';
    if (state.files.length) {
      actions.innerHTML = `<div class="text-sm text-muted">${state.files.length} file${state.files.length===1?'':'s'} · total ${fmtBytes(state.files.reduce((s,f)=>s+f.size,0))}</div>`;
      const btn = document.createElement('button');
      btn.className='btn-primary px-5 py-2.5 rounded-xl text-sm font-medium'; btn.textContent='Merge & Download';
      btn.disabled = state.files.length < 2;
      if (btn.disabled) btn.title='Add at least 2 PDFs';
      btn.onclick = doMerge;
      actions.appendChild(btn);
    }
  }
  async function doMerge() {
    const proc = processingPanel('Merging PDFs…'); view.innerHTML=''; view.appendChild(proc);
    try {
      const out = await PDFDocument.create();
      for (let i=0; i<state.files.length; i++) {
        proc.querySelector('#proc-text').textContent = `Merging file ${i+1} of ${state.files.length}…`;
        const src = await PDFDocument.load(state.files[i].buf);
        const pages = await out.copyPages(src, src.getPageIndices());
        pages.forEach(p => out.addPage(p));
      }
      const bytes = await out.save();
      const blob = new Blob([bytes], { type:'application/pdf' });
      view.innerHTML=''; view.appendChild(successPanel({ message:'PDFs merged', filename:'merged.pdf', blob, onReset:renderMerge }));
      toast('Merged successfully','success');
    } catch (e) { console.error(e); toast('Merge failed','error'); renderMerge(); }
  }
  render();
}

/* ---------- SPLIT ---------- */
function renderSplit() {
  const state = { file:null, buf:null, pages:0, mode:'range', range:'' };
  const root = document.createElement('div'); root.className='flex flex-col gap-6'; view.appendChild(root);
  root.appendChild(dropzone({ onFiles: async ([f]) => {
    const err = validatePdf(f); if (err) return toast(err,'error');
    try {
      const buf = await f.arrayBuffer();
      const pdf = await loadPdfJs(buf);
      state.file=f; state.buf=buf; state.pages=pdf.numPages; state.pdfjs=pdf;
      render();
    } catch { toast('Corrupted PDF','error'); }
  }}));

  async function render() {
    root.innerHTML=''; root.appendChild(dropzone({ onFiles: async ([f]) => {
      const err=validatePdf(f); if (err) return toast(err,'error');
      const buf = await f.arrayBuffer(); const pdf = await loadPdfJs(buf);
      state.file=f; state.buf=buf; state.pages=pdf.numPages; state.pdfjs=pdf; render();
    }}));
    if (!state.file) return;
    root.appendChild(fileMeta(state.file.name, state.file.size, state.pages));

    const tabs = document.createElement('div'); tabs.className='flex gap-2';
    for (const [id,label] of [['range','By Range'],['every','Every Page']]) {
      const c=document.createElement('button'); c.className='chip'+(state.mode===id?' active':''); c.textContent=label;
      c.onclick=()=>{ state.mode=id; render(); }; tabs.appendChild(c);
    }
    root.appendChild(tabs);

    if (state.mode==='range') {
      const box = document.createElement('div'); box.className='card p-5 flex flex-col gap-3';
      box.innerHTML = `<div class="text-sm font-medium">Page ranges</div>
        <div class="text-[13px] text-muted">Comma-separated. Example: <code class="text-fg">1-3, 5, 7-9</code></div>`;
      const inp=document.createElement('input'); inp.type='text'; inp.placeholder='1-3, 5, 7-9'; inp.value=state.range;
      inp.oninput=()=>state.range=inp.value;
      box.appendChild(inp);
      root.appendChild(box);
    }

    const grid = document.createElement('div'); grid.className='grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3';
    for (let i=0;i<state.pages;i++) {
      const c = document.createElement('div'); c.className='thumb'; grid.appendChild(c);
      renderThumb(state.pdfjs, i, 200).then(cv=>{ c.appendChild(cv); c.insertAdjacentHTML('beforeend',`<div class="badge" style="background:#262626">${i+1}</div>`); });
    }
    root.appendChild(grid);

    const btn = document.createElement('button');
    btn.className='btn-primary self-start px-5 py-2.5 rounded-xl text-sm font-medium';
    btn.textContent = state.mode==='range' ? 'Split & Download ZIP' : 'Split Every Page & Download ZIP';
    btn.onclick = doSplit;
    root.appendChild(btn);
  }
  function parseRanges(str, max) {
    const out=[];
    for (const part of str.split(',').map(s=>s.trim()).filter(Boolean)) {
      const m = part.match(/^(\d+)(?:-(\d+))?$/); if (!m) throw new Error('Bad range: '+part);
      const a=parseInt(m[1]), b=m[2]?parseInt(m[2]):a;
      if (a<1||b<a||b>max) throw new Error('Out of bounds: '+part);
      out.push([a,b]);
    }
    return out;
  }
  async function doSplit() {
    try {
      let ranges;
      if (state.mode==='range') ranges = parseRanges(state.range, state.pages);
      else ranges = Array.from({length:state.pages}, (_,i)=>[i+1,i+1]);
      if (!ranges.length) return toast('Enter at least one range','error');
      const proc=processingPanel('Splitting…'); view.innerHTML=''; view.appendChild(proc);
      const src = await PDFDocument.load(state.buf);
      const zip = new JSZip();
      for (let i=0;i<ranges.length;i++) {
        const [a,b]=ranges[i];
        proc.querySelector('#proc-text').textContent=`Building segment ${i+1} of ${ranges.length}…`;
        const out = await PDFDocument.create();
        const idx=[]; for (let p=a-1;p<b;p++) idx.push(p);
        const pages = await out.copyPages(src, idx);
        pages.forEach(p=>out.addPage(p));
        const bytes = await out.save();
        zip.file(a===b?`page-${a}.pdf`:`pages-${a}-${b}.pdf`, bytes);
      }
      const blob = await zip.generateAsync({ type:'blob' });
      view.innerHTML=''; view.appendChild(successPanel({ message:'Split complete', filename:'split.zip', blob, onReset:renderSplit }));
      toast('Split complete','success');
    } catch (e) { toast(e.message||'Split failed','error'); render(); }
  }
  render();
}

/* ---------- ROTATE ---------- */
function renderRotate() {
  const state = { file:null, buf:null, pages:0, pdfjs:null, rot:[] };
  const root=document.createElement('div'); root.className='flex flex-col gap-6'; view.appendChild(root);
  function mount() {
    root.innerHTML='';
    root.appendChild(dropzone({ onFiles: async ([f]) => {
      const err=validatePdf(f); if (err) return toast(err,'error');
      try {
        const buf=await f.arrayBuffer(); const pdf=await loadPdfJs(buf);
        state.file=f; state.buf=buf; state.pages=pdf.numPages; state.pdfjs=pdf; state.rot=new Array(pdf.numPages).fill(0);
        mount();
      } catch { toast('Corrupted PDF','error'); }
    }}));
    if (!state.file) return;
    root.appendChild(fileMeta(state.file.name, state.file.size, state.pages));
    const grid=document.createElement('div'); grid.className='grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3';
    for (let i=0;i<state.pages;i++) {
      const c=document.createElement('div'); c.className='thumb cursor-pointer'; grid.appendChild(c);
      renderThumb(state.pdfjs,i,200).then(cv=>{
        c.appendChild(cv);
        const badge = document.createElement('div'); badge.className='badge'; c.appendChild(badge);
        const num = document.createElement('div'); num.className='badge'; num.style.left='6px'; num.style.right='auto'; num.style.background='#262626'; num.textContent=i+1; c.appendChild(num);
        const update=()=>{ badge.textContent=state.rot[i]+'°'; cv.style.transform=`rotate(${state.rot[i]}deg)`; cv.style.transition='transform .2s'; };
        update();
        c.onclick=()=>{ state.rot[i]=(state.rot[i]+90)%360; update(); };
      });
    }
    root.appendChild(grid);
    const btn=document.createElement('button'); btn.className='btn-primary self-start px-5 py-2.5 rounded-xl text-sm font-medium'; btn.textContent='Apply & Download';
    btn.onclick=doRotate; root.appendChild(btn);
  }
  async function doRotate() {
    const proc=processingPanel('Applying rotation…'); view.innerHTML=''; view.appendChild(proc);
    try {
      const doc = await PDFDocument.load(state.buf);
      doc.getPages().forEach((p,i)=>{ if (state.rot[i]) p.setRotation(degrees((p.getRotation().angle + state.rot[i]) % 360)); });
      const bytes=await doc.save();
      const blob=new Blob([bytes],{type:'application/pdf'});
      view.innerHTML=''; view.appendChild(successPanel({ message:'Rotation applied', filename:'rotated.pdf', blob, onReset:renderRotate }));
    } catch { toast('Rotate failed','error'); mount(); }
  }
  mount();
}

/* ---------- REORDER ---------- */
function renderReorder() {
  const state={ file:null, buf:null, order:[], pdfjs:null };
  const root=document.createElement('div'); root.className='flex flex-col gap-6'; view.appendChild(root);
  function mount() {

/* ---------- WATERMARK ---------- */
function renderWatermark() {
  const state = { file:null, buf:null, pdfjs:null, pages:0,
    type:'text', text:'CONFIDENTIAL', size:48, color:'#3B82F6', opacity:40, position:4, rotation:-30, image:null };
  const root=document.createElement('div'); root.className='flex flex-col gap-6'; view.appendChild(root);
  function mount() {
    root.innerHTML='';
    root.appendChild(dropzone({ onFiles: async ([f]) => {
      const err=validatePdf(f); if (err) return toast(err,'error');
      try { const buf=await f.arrayBuffer(); const pdf=await loadPdfJs(buf); state.file=f; state.buf=buf; state.pdfjs=pdf; state.pages=pdf.numPages; mount(); } catch { toast('Corrupted PDF','error'); }
    }}));
    if (!state.file) return;
    root.appendChild(fileMeta(state.file.name, state.file.size, state.pages));

    const layout=document.createElement('div'); layout.className='grid md:grid-cols-[320px_1fr] gap-6';
    // Config
    const cfg=document.createElement('div'); cfg.className='card p-5 flex flex-col gap-4';
    cfg.innerHTML=`
      <div>
        <div class="text-[13px] font-medium mb-2">Type</div>
        <div class="flex gap-2">
          <button class="chip ${state.type==='text'?'active':''}" data-type="text">Text</button>
          <button class="chip ${state.type==='image'?'active':''}" data-type="image">Image</button>
        </div>
      </div>
      <div id="text-fields" class="flex flex-col gap-3 ${state.type==='text'?'':'hidden'}">
        <label class="text-[13px] text-muted">Watermark text
          <input id="wm-text" type="text" class="w-full mt-1" value="${state.text}"/>
        </label>
        <label class="text-[13px] text-muted">Font size: <span id="wm-size-v">${state.size}</span>px
          <input id="wm-size" type="range" min="12" max="72" value="${state.size}" class="w-full mt-1"/>
        </label>
        <label class="text-[13px] text-muted flex items-center gap-3">Color
          <input id="wm-color" type="color" value="${state.color}"/>
        </label>
      </div>
      <div id="img-fields" class="${state.type==='image'?'':'hidden'}">
        <label class="text-[13px] text-muted">Image
          <input id="wm-img" type="file" accept="image/png,image/jpeg" class="w-full mt-1 text-fg"/>
        </label>
        <div class="text-[12px] text-muted mt-2">${state.image?'Loaded ('+state.image.type+')':'PNG or JPG'}</div>
      </div>
      <label class="text-[13px] text-muted">Opacity: <span id="wm-op-v">${state.opacity}</span>%
        <input id="wm-op" type="range" min="0" max="100" value="${state.opacity}" class="w-full mt-1"/>
      </label>
      <label class="text-[13px] text-muted">Rotation: <span id="wm-rot-v">${state.rotation}</span>°
        <input id="wm-rot" type="range" min="-90" max="90" value="${state.rotation}" class="w-full mt-1"/>
      </label>
      <div>
        <div class="text-[13px] font-medium mb-2">Position</div>
        <div class="grid grid-cols-3 gap-2" id="pos-grid">
          ${[0,1,2,3,4,5,6,7,8].map(i=>`<div class="pos-cell ${state.position===i?'active':''}" data-pos="${i}"></div>`).join('')}
        </div>
      </div>
    `;
    layout.appendChild(cfg);

    // Preview
    const prev=document.createElement('div'); prev.className='card p-5 flex flex-col items-center justify-center min-h-[400px]';
    prev.innerHTML=`<div class="text-[13px] text-muted mb-3">Live preview · Page 1</div><div id="wm-preview" class="relative"></div>`;
    layout.appendChild(prev);
    root.appendChild(layout);

    // Actions
    const btn=document.createElement('button'); btn.className='btn-primary self-start px-5 py-2.5 rounded-xl text-sm font-medium'; btn.textContent='Apply to All Pages & Download';
    btn.onclick=doWatermark; root.appendChild(btn);

    // Wire
    cfg.querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>{ state.type=b.dataset.type; mount(); });
    cfg.querySelectorAll('.pos-cell').forEach(b=>b.onclick=()=>{ state.position=+b.dataset.pos; cfg.querySelectorAll('.pos-cell').forEach(x=>x.classList.remove('active')); b.classList.add('active'); updatePreview(); });
    const bindRange = (id, key, disp) => {
      const el = cfg.querySelector('#'+id), v = cfg.querySelector('#'+disp);
      if (!el) return;
      el.oninput = () => { state[key] = +el.value; v.textContent = el.value; updatePreview(); };
    };
    bindRange('wm-size','size','wm-size-v');
    bindRange('wm-op','opacity','wm-op-v');
    bindRange('wm-rot','rotation','wm-rot-v');
    const t=cfg.querySelector('#wm-text'); if (t) t.oninput=()=>{state.text=t.value; updatePreview();};
    const c=cfg.querySelector('#wm-color'); if (c) c.oninput=()=>{state.color=c.value; updatePreview();};
    const img=cfg.querySelector('#wm-img');
    if (img) img.onchange = async () => {
      const f=img.files[0]; if (!f) return;
      const buf=await f.arrayBuffer();
      state.image = { buf, type: f.type.includes('png')?'png':'jpg' };
      updatePreview();
    };
    updatePreview();
  }
  async function updatePreview() {
    const el = document.getElementById('wm-preview'); if (!el || !state.pdfjs) return;
    el.innerHTML='';
    const cv = await renderThumb(state.pdfjs, 0, 360);
    cv.style.borderRadius='8px'; el.appendChild(cv);
    const overlay=document.createElement('div');
    overlay.style.cssText='position:absolute;inset:0;pointer-events:none;';
    const [row,col]=[Math.floor(state.position/3), state.position%3];
    const align=['flex-start','center','flex-end'];
    overlay.style.display='flex'; overlay.style.flexDirection='column';
    overlay.style.justifyContent=align[row]; overlay.style.alignItems=align[col];
    overlay.style.padding='16px';
    if (state.type==='text') {
      const t=document.createElement('div');
      t.textContent=state.text||' ';
      t.style.cssText=`color:${state.color};opacity:${state.opacity/100};font-size:${state.size*0.5}px;font-weight:700;transform:rotate(${-state.rotation}deg);white-space:nowrap;`;
      overlay.appendChild(t);
    } else if (state.image) {
      const url = URL.createObjectURL(new Blob([state.image.buf]));
      const im = document.createElement('img'); im.src=url; im.style.cssText=`max-width:40%;max-height:40%;opacity:${state.opacity/100};transform:rotate(${-state.rotation}deg);`;
      overlay.appendChild(im);
    }
    el.appendChild(overlay);
  }
  function hexToRgb(hex) {
    const m = hex.replace('#','').match(/.{2}/g).map(x=>parseInt(x,16)/255);
    return rgb(m[0],m[1],m[2]);
  }
  async function doWatermark() {
    const proc=processingPanel('Applying watermark…'); view.innerHTML=''; view.appendChild(proc);
    try {
      const doc=await PDFDocument.load(state.buf);
      let img=null, dims=null;
      if (state.type==='image') {
        if (!state.image) { toast('Choose an image','error'); return mount(); }
        img = state.image.type==='png' ? await doc.embedPng(state.image.buf) : await doc.embedJpg(state.image.buf);
        dims = img.scale(1);
      }
      const font = await doc.embedFont(StandardFonts.HelveticaBold);
      const pages=doc.getPages();
      for (let i=0;i<pages.length;i++) {
        proc.querySelector('#proc-text').textContent=`Processing page ${i+1} of ${pages.length}…`;
        const p=pages[i]; const { width:w, height:h } = p.getSize();
        const [row,col]=[Math.floor(state.position/3), state.position%3];
        const margin = 30;
        if (state.type==='text') {
          const size = state.size;
          const textWidth = font.widthOfTextAtSize(state.text, size);
          const x = col===0?margin: col===1? (w-textWidth)/2 : w-textWidth-margin;
          const y = row===0? h-size-margin : row===1? (h-size)/2 : margin;
          p.drawText(state.text, {
            x, y, size, font, color: hexToRgb(state.color),
            opacity: state.opacity/100, rotate: degrees(state.rotation),
          });
        } else {
          const targetW = w*0.35;
          const scale = targetW / dims.width;
          const iw = dims.width*scale, ih = dims.height*scale;
          const x = col===0?margin : col===1?(w-iw)/2 : w-iw-margin;
          const y = row===0? h-ih-margin : row===1? (h-ih)/2 : margin;
          p.drawImage(img, { x, y, width: iw, height: ih, opacity: state.opacity/100, rotate: degrees(state.rotation) });
        }
      }
      const bytes=await doc.save(); const blob=new Blob([bytes],{type:'application/pdf'});
      view.innerHTML=''; view.appendChild(successPanel({ message:'Watermark applied', filename:'watermarked.pdf', blob, onReset:renderWatermark }));
    } catch (e) { console.error(e); toast('Watermark failed','error'); mount(); }
  }
  mount();
}

  function mount() {
    root.innerHTML='';

/* ---------- PDF ↔ IMAGE ---------- */
function renderImage() {
  const state={ dir:'p2i', pdfjs:null, buf:null, file:null, format:'png', quality:90, images:[], size:'A4' };
  const root=document.createElement('div'); root.className='flex flex-col gap-6'; view.appendChild(root);
  function mount() {
    root.innerHTML='';
    const tabs=document.createElement('div'); tabs.className='flex gap-2';
    for (const [id,label] of [['p2i','PDF to Images'],['i2p','Images to PDF']]) {
      const c=document.createElement('button'); c.className='chip'+(state.dir===id?' active':''); c.textContent=label;
      c.onclick=()=>{ state.dir=id; mount(); }; tabs.appendChild(c);
    }
    root.appendChild(tabs);

    if (state.dir==='p2i') mountP2I(); else mountI2P();
  }
  function mountP2I() {
    root.appendChild(dropzone({ onFiles: async ([f]) => {
      const err=validatePdf(f); if (err) return toast(err,'error');
      try { const buf=await f.arrayBuffer(); const pdf=await loadPdfJs(buf); state.file=f; state.buf=buf; state.pdfjs=pdf; mount(); } catch { toast('Corrupted PDF','error'); }
    }}));
    if (!state.file) return;
    root.appendChild(fileMeta(state.file.name, state.file.size, state.pdfjs.numPages));

    const cfg=document.createElement('div'); cfg.className='card p-5 flex flex-wrap gap-4 items-end';
    cfg.innerHTML=`
      <label class="text-[13px] text-muted">Format
        <select id="fmt" class="block mt-1"><option value="png" ${state.format==='png'?'selected':''}>PNG</option><option value="jpg" ${state.format==='jpg'?'selected':''}>JPG</option></select>
      </label>
      <label class="text-[13px] text-muted ${state.format==='jpg'?'':'opacity-40 pointer-events-none'}">Quality: <span id="qv">${state.quality}</span>%
        <input id="q" type="range" min="30" max="100" value="${state.quality}" class="block mt-1 w-60"/>
      </label>`;
    root.appendChild(cfg);
    cfg.querySelector('#fmt').onchange=e=>{state.format=e.target.value; mount();};
    cfg.querySelector('#q').oninput=e=>{state.quality=+e.target.value; cfg.querySelector('#qv').textContent=e.target.value;};

    const btn=document.createElement('button'); btn.className='btn-primary self-start px-5 py-2.5 rounded-xl text-sm font-medium'; btn.textContent='Convert & Download ZIP';
    btn.onclick=async()=>{
      const proc=processingPanel('Rendering pages…'); view.innerHTML=''; view.appendChild(proc);
      try {
        const zip=new JSZip();
        for (let i=0;i<state.pdfjs.numPages;i++) {
          proc.querySelector('#proc-text').textContent=`Rendering page ${i+1} of ${state.pdfjs.numPages}…`;
          const page=await state.pdfjs.getPage(i+1);
          const vp=page.getViewport({ scale: 2 });
          const cv=document.createElement('canvas'); cv.width=vp.width; cv.height=vp.height;
          await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
          const blob = await new Promise(res => cv.toBlob(res, state.format==='png'?'image/png':'image/jpeg', state.quality/100));
          zip.file(`page-${String(i+1).padStart(3,'0')}.${state.format}`, blob);
        }
        const blob=await zip.generateAsync({type:'blob'});
        view.innerHTML=''; view.appendChild(successPanel({ message:'Images ready', filename:'images.zip', blob, onReset:renderImage }));
      } catch (e) { console.error(e); toast('Conversion failed','error'); mount(); }
    };
    root.appendChild(btn);
  }
  function mountI2P() {
    root.appendChild(dropzone({ multiple:true, accept:'image/png,image/jpeg', hint:'Drop images here or click to browse', sub:'PNG or JPG · Max 50 MB each', onFiles: async files => {
      for (const f of files) {
        if (!/image\/(png|jpe?g)/.test(f.type)) { toast('Not an image: '+f.name,'error'); continue; }
        if (f.size>MAX) { toast(f.name+' exceeds 50 MB','error'); continue; }
        const buf=await f.arrayBuffer();
        state.images.push({ file:f, buf, url:URL.createObjectURL(f) });
      }
      mount();
    }}));

    if (state.images.length) {
      const cfg=document.createElement('div'); cfg.className='card p-5 flex flex-wrap gap-4 items-end';
      cfg.innerHTML=`<label class="text-[13px] text-muted">Page size
        <select id="sz" class="block mt-1">
          <option value="A4" ${state.size==='A4'?'selected':''}>A4</option>
          <option value="Letter" ${state.size==='Letter'?'selected':''}>Letter</option>
          <option value="Fit" ${state.size==='Fit'?'selected':''}>Fit to image</option>
        </select></label>`;
      cfg.querySelector('#sz').onchange=e=>state.size=e.target.value;
      root.appendChild(cfg);

      const list=document.createElement('div'); list.className='flex flex-col gap-2';
      state.images.forEach((it,i)=>{
        const row=document.createElement('div'); row.className='row-item card p-3 flex items-center gap-3';
        row.innerHTML=`<img src="${it.url}" class="w-10 h-10 rounded-md object-cover border border-brd"/>
          <div class="flex-1 min-w-0"><div class="text-sm font-medium truncate">${it.file.name}</div><div class="text-[12px] text-muted">${fmtBytes(it.file.size)}</div></div>
          <div class="drag-handle text-muted p-2">${icons.grip}</div>
          <button class="rm text-muted hover:text-red-400 p-2">${icons.trash}</button>`;
        row.querySelector('.rm').onclick=()=>{ state.images.splice(i,1); mount(); };
        list.appendChild(row);
      });
      enableReorder(list,'.row-item',(from,to)=>{ const [m]=state.images.splice(from,1); state.images.splice(to,0,m); mount(); });
      root.appendChild(list);

      const btn=document.createElement('button'); btn.className='btn-primary self-start px-5 py-2.5 rounded-xl text-sm font-medium'; btn.textContent='Build PDF & Download';
      btn.onclick=async()=>{
        const proc=processingPanel('Building PDF…'); view.innerHTML=''; view.appendChild(proc);
        try {
          const doc=await PDFDocument.create();
          const sizes = { A4:[595.28,841.89], Letter:[612,792] };
          for (let i=0;i<state.images.length;i++) {
            proc.querySelector('#proc-text').textContent=`Embedding image ${i+1} of ${state.images.length}…`;
            const it=state.images[i];
            const img = /png/.test(it.file.type) ? await doc.embedPng(it.buf) : await doc.embedJpg(it.buf);
            let pw, ph;
            if (state.size==='Fit') { pw=img.width; ph=img.height; }
            else { [pw,ph]=sizes[state.size]; }
            const page=doc.addPage([pw,ph]);
            if (state.size==='Fit') page.drawImage(img,{x:0,y:0,width:pw,height:ph});
            else {
              const scale=Math.min(pw/img.width, ph/img.height)*0.95;
              const w=img.width*scale, h=img.height*scale;
              page.drawImage(img,{ x:(pw-w)/2, y:(ph-h)/2, width:w, height:h });
            }
          }
          const bytes=await doc.save(); const blob=new Blob([bytes],{type:'application/pdf'});
          view.innerHTML=''; view.appendChild(successPanel({ message:'PDF built', filename:'images.pdf', blob, onReset:renderImage }));
        } catch (e) { console.error(e); toast('Build failed','error'); mount(); }
      };
      root.appendChild(btn);
    }
  }
  mount();
}
