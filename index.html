      <label class="text-[13px] text-muted">Starting number
        <input id="start" type="number" value="${state.start}" class="w-full mt-1"/></label>
      <label class="text-[13px] flex items-center gap-2 select-none cursor-pointer">
        <input id="skip" type="checkbox" ${state.skipFirst?'checked':''}/> Skip first page
      </label>
    `;
    layout.appendChild(cfg);
    const prev=document.createElement('div'); prev.className='card p-5 flex flex-col items-center justify-center min-h-[400px]';
    prev.innerHTML=`<div class="text-[13px] text-muted mb-3">Live preview · Page 1</div><div id="np-preview" class="relative"></div>`;
    layout.appendChild(prev);
    root.appendChild(layout);

    cfg.querySelectorAll('[data-pos]').forEach(b=>b.onclick=()=>{state.position=b.dataset.pos; mount();});
    cfg.querySelector('#fmt').onchange=e=>{state.format=e.target.value; updatePreview();};
    cfg.querySelector('#sz').oninput=e=>{state.size=+e.target.value; cfg.querySelector('#sv').textContent=e.target.value; updatePreview();};
    cfg.querySelector('#col').oninput=e=>{state.color=e.target.value; updatePreview();};
    cfg.querySelector('#start').oninput=e=>{state.start=+e.target.value||1; updatePreview();};
    cfg.querySelector('#skip').onchange=e=>{state.skipFirst=e.target.checked; updatePreview();};

    const btn=document.createElement('button'); btn.className='btn-primary self-start px-5 py-2.5 rounded-xl text-sm font-medium'; btn.textContent='Apply & Download';
    btn.onclick=doNumber; root.appendChild(btn);
    updatePreview();
  }
  function formatFor(i,total) {
    const n = state.start + i;
    const t = state.start + total - 1;
    return state.format==='n'?String(n): state.format==='n/t'?`${n} / ${t}`:`Page ${n} of ${t}`;
  }
  async function updatePreview() {
    const el=document.getElementById('np-preview'); if (!el||!state.pdfjs) return;
    el.innerHTML='';
    const cv=await renderThumb(state.pdfjs,0,360); cv.style.borderRadius='8px'; el.appendChild(cv);
    if (state.skipFirst) return;
    const label=formatFor(0, state.pages);
    const t=document.createElement('div');
    t.textContent=label;
    t.style.cssText=`position:absolute;color:${state.color};font-size:${state.size*0.55}px;font-weight:600;padding:6px 8px;`;
    const p=state.position;
    if (p[0]==='h') t.style.top='0px'; else t.style.bottom='0px';
    if (p[1]==='l') t.style.left='4px';
    else if (p[1]==='c') { t.style.left='50%'; t.style.transform='translateX(-50%)'; }
    else t.style.right='4px';
    el.appendChild(t);
  }
  function hexToRgb(hex) { const m=hex.replace('#','').match(/.{2}/g).map(x=>parseInt(x,16)/255); return rgb(m[0],m[1],m[2]); }
  async function doNumber() {
    const proc=processingPanel('Numbering pages…'); view.innerHTML=''; view.appendChild(proc);
    try {
      const doc=await PDFDocument.load(state.buf);
      const font=await doc.embedFont(StandardFonts.Helvetica);
      const pages=doc.getPages(); const total=pages.length - (state.skipFirst?1:0);
      const startIdx = state.skipFirst?1:0;
      for (let i=startIdx;i<pages.length;i++) {
        proc.querySelector('#proc-text').textContent=`Processing page ${i+1} of ${pages.length}…`;
        const p=pages[i]; const {width:w,height:h}=p.getSize();
        const label = formatFor(i-startIdx, total);
        const tw = font.widthOfTextAtSize(label, state.size);
        const margin=24;
        let x, y;
        const pos=state.position;
        if (pos[1]==='l') x=margin; else if (pos[1]==='c') x=(w-tw)/2; else x=w-tw-margin;
        if (pos[0]==='h') y=h-state.size-margin; else y=margin;
        p.drawText(label, { x, y, size: state.size, font, color: hexToRgb(state.color) });
      }
      const bytes=await doc.save(); const blob=new Blob([bytes],{type:'application/pdf'});
      view.innerHTML=''; view.appendChild(successPanel({ message:'Page numbers added', filename:'numbered.pdf', blob, onReset:renderNumber }));
    } catch (e) { console.error(e); toast('Numbering failed','error'); mount(); }
  }
  mount();
}

/* ---------- COMPRESS ---------- */
function renderCompress() {
  const state = { file:null, buf:null, pdfjs:null, level:'medium' };
  const LEVELS = {
    low:    { label:'Low',    desc:'Smallest file, lower image quality.',  dpi:72,  q:0.55 },
    medium: { label:'Medium', desc:'Balanced size and quality (recommended).', dpi:110, q:0.72 },
    high:   { label:'High',   desc:'Best image quality, larger file.',     dpi:150, q:0.85 },
  };
  const root=document.createElement('div'); root.className='flex flex-col gap-6'; view.appendChild(root);
  const dz=dropzone({ multiple:false, onFiles: async files => {
    const f=files[0]; const err=validatePdf(f); if(err){toast(err,'error');return;}
    try {
      state.file=f; state.buf=await f.arrayBuffer();
      state.pdfjs=await loadPdfJs(state.buf);
      mount();
    } catch { toast('Could not read PDF','error'); }
  }, hint:'Drop PDF here to compress or click to browse' });

  function mount() {
    root.innerHTML='';
    if (!state.buf) { root.appendChild(dz); return; }
    root.appendChild(fileMeta(state.file.name, state.file.size, state.pdfjs.numPages));

    const grid=document.createElement('div'); grid.className='grid gap-3 md:grid-cols-3';
    for (const [id,cfg] of Object.entries(LEVELS)) {
      const card=document.createElement('button');
      card.className='card p-5 text-left flex flex-col gap-2 '+(state.level===id?'ring-2 ring-accent border-accent':'');
      card.style.cursor='pointer';
      card.innerHTML=`
        <div class="flex items-center justify-between">
          <div class="text-[15px] font-semibold">${cfg.label}</div>
          <div class="w-4 h-4 rounded-full border-2 ${state.level===id?'border-accent bg-accent':'border-brd2'}"></div>
        </div>
        <div class="text-[12px] text-muted">${cfg.desc}</div>
        <div class="text-[11px] text-muted mt-1">≈ ${cfg.dpi} DPI · JPEG ${Math.round(cfg.q*100)}%</div>`;
      card.onclick=()=>{ state.level=id; mount(); };
      grid.appendChild(card);
    }
    root.appendChild(grid);

    const note=document.createElement('div');
    note.className='text-[12px] text-muted';
    note.textContent='Setiap halaman di-render ulang menjadi gambar JPEG terkompresi. Teks tidak lagi bisa di-select setelah kompresi.';
    root.appendChild(note);

    const bar=document.createElement('div'); bar.className='flex justify-end';
    const go=document.createElement('button'); go.className='btn-primary px-5 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2';
    go.innerHTML=`${icons.compress} Compress PDF`; go.onclick=doCompress;
    bar.appendChild(go); root.appendChild(bar);
  }

  async function doCompress() {
    const cfg=LEVELS[state.level];
    const proc=processingPanel('Compressing…'); view.innerHTML=''; view.appendChild(proc);
    const label=proc.querySelector('#proc-text');
    try {
      const out=await PDFDocument.create();
      const total=state.pdfjs.numPages;
      for (let i=1;i<=total;i++) {
        label.textContent=`Compressing page ${i} of ${total}…`;
        const page=await state.pdfjs.getPage(i);
        const vp1=page.getViewport({scale:1});
        const scale=cfg.dpi/72;
        const vp=page.getViewport({scale});
        const cv=document.createElement('canvas');
        cv.width=Math.floor(vp.width); cv.height=Math.floor(vp.height);
        const ctx=cv.getContext('2d');
        ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,cv.width,cv.height);
        await page.render({ canvasContext:ctx, viewport:vp }).promise;
        const dataUrl=cv.toDataURL('image/jpeg', cfg.q);
        const bin=atob(dataUrl.split(',')[1]);
        const arr=new Uint8Array(bin.length);
        for (let j=0;j<bin.length;j++) arr[j]=bin.charCodeAt(j);
        const jpg=await out.embedJpg(arr);
        const p=out.addPage([vp1.width, vp1.height]);
        p.drawImage(jpg, { x:0, y:0, width:vp1.width, height:vp1.height });
      }
      const bytes=await out.save({ useObjectStreams:true });
      const blob=new Blob([bytes], { type:'application/pdf' });
      const orig=state.file.size, now=blob.size;
      const pct = orig>0 ? Math.max(0, Math.round((1 - now/orig)*100)) : 0;
      view.innerHTML='';
      const panel=successPanel({
        message: pct>0 ? `Compressed by ${pct}%` : 'Compression complete',
        filename:(state.file.name.replace(/\.pdf$/i,'')||'document')+'-compressed.pdf',
        blob, onReset:renderCompress,
      });
      const stat=document.createElement('div');
      stat.className='text-[13px] text-muted mt-3';
      stat.innerHTML=`Original: <span class="text-fg font-medium">${fmtBytes(orig)}</span> → Compressed: <span class="text-fg font-medium">${fmtBytes(now)}</span>`;
      panel.insertBefore(stat, panel.querySelector('#dl').parentElement);
      view.appendChild(panel);
    } catch(e) { console.error(e); toast('Compression failed: '+e.message,'error'); mount(); }
  }

  mount();
}

/* ---------- EDITOR ---------- */
function renderEdit() {
  const state = {
    file:null, buf:null, pdfjs:null, pageIndex:0, pageCount:0,
    scale:1, // display px per PDF point (per page)
    pageSizes:[], // {w,h} in PDF points
    annos:{}, // pageIndex -> [{id,type,...} in PDF points, top-left origin]
    tool:'select',
    // style config
    textSize:16, textColor:'#111111',
    strokeColor:'#EF4444', strokeWidth:2,
    highlightColor:'#FFEB3B', redactColor:'#000000',
    imageData:null, imageDims:null, // for image/signature stamp
    selectedId:null,
  };
  const root=document.createElement('div'); root.className='flex flex-col gap-6'; view.appendChild(root);

  const dz=dropzone({ multiple:false, onFiles: async files => {
    const f=files[0]; const err=validatePdf(f); if(err){toast(err,'error');return;}
    try {
      state.file=f; state.buf=await f.arrayBuffer();
      state.pdfjs=await loadPdfJs(state.buf);
      state.pageCount=state.pdfjs.numPages;
      state.pageSizes=[];
      for (let i=1;i<=state.pageCount;i++) {
        const p=await state.pdfjs.getPage(i);
        const v=p.getViewport({scale:1});
        state.pageSizes.push({w:v.width,h:v.height});
        state.annos[i-1]=[];
      }
      state.pageIndex=0;
      mount();
    } catch { toast('Could not read PDF','error'); }
  }, hint:'Drop PDF here to edit or click to browse' });

  function mount() {
    root.innerHTML='';
    if (!state.buf) { root.appendChild(dz); return; }
    root.appendChild(fileMeta(state.file.name, state.file.size, state.pageCount));
    root.appendChild(buildToolbar());
    const grid=document.createElement('div');
    grid.className='edit-grid';
    root.appendChild(grid);
    const thumbs=buildThumbs(); thumbs.classList.add('edit-thumbs'); grid.appendChild(thumbs);
    const stageWrap=document.createElement('div'); stageWrap.id='stage-wrap'; grid.appendChild(stageWrap);
    const inspector=buildInspector(); inspector.classList.add('edit-inspector'); grid.appendChild(inspector);
    const actions=document.createElement('div'); actions.className='flex items-center justify-between mt-2';
    actions.innerHTML=`<div class="text-[12px] text-muted">Tip: klik/drag di halaman untuk menambahkan elemen. Tekan Delete untuk menghapus yang dipilih.</div>`;
    const save=document.createElement('button'); save.className='btn-primary px-5 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2';
    save.innerHTML=`${icons.download} Save PDF`; save.onclick=doSave;
    actions.appendChild(save); root.appendChild(actions);
    renderStage();
  }

  function buildToolbar() {
    const bar=document.createElement('div'); bar.className='card p-2 flex flex-wrap gap-1.5';
    const tools=[
      ['select','Select',icons.cursor],
      ['text','Text',icons.type],
      ['image','Image',icons.pic],
      ['signature','Signature',icons.sig],
      ['highlight','Highlight',icons.hi],
      ['rect','Rectangle',icons.rect],
      ['line','Line',icons.line],
      ['arrow','Arrow',icons.arrow],
      ['redact','Redact',icons.redact],
    ];
    for (const [id,label,icon] of tools) {
      const b=document.createElement('button');
      b.className='edit-tool-btn'+(state.tool===id?' active':'');
      b.innerHTML=`${icon}<span>${label}</span>`;
      b.onclick=()=>{ state.tool=id; state.selectedId=null; if(id==='image')pickImage(false); else if(id==='signature')openSignaturePad(); mount(); };
      bar.appendChild(b);
    }
    return bar;
  }

  function buildInspector() {
    const p=document.createElement('div'); p.className='card p-4 flex flex-col gap-3 text-sm';
    p.innerHTML=`<div class="font-semibold">Style</div>`;
    const row=(label,html)=>{const d=document.createElement('div'); d.className='flex items-center justify-between gap-3'; d.innerHTML=`<span class="text-muted text-[12px]">${label}</span><span>${html}</span>`; return d;};
    if (state.tool==='text'||(state.tool==='select'&&getSelected()?.type==='text')) {
      const sel=getSelected();
      const size=sel?sel.size:state.textSize; const color=sel?sel.color:state.textColor;
      const r1=row('Size',`<input type="number" min="6" max="96" value="${size}" style="width:70px" id="ts"/>`);
      const r2=row('Color',`<input type="color" value="${color}" id="tc"/>`);
      p.appendChild(r1); p.appendChild(r2);
      r1.querySelector('#ts').oninput=e=>{const v=+e.target.value||16; if(sel){sel.size=v;renderOverlay();} else state.textSize=v;};
      r2.querySelector('#tc').oninput=e=>{if(sel){sel.color=e.target.value;renderOverlay();} else state.textColor=e.target.value;};
    } else if (state.tool==='highlight') {
      const r=row('Color',`<input type="color" value="${state.highlightColor}" id="hc"/>`);
      p.appendChild(r); r.querySelector('#hc').oninput=e=>state.highlightColor=e.target.value;
    } else if (state.tool==='rect'||state.tool==='line'||state.tool==='arrow') {
      const r1=row('Color',`<input type="color" value="${state.strokeColor}" id="sc"/>`);
      const r2=row('Width',`<input type="number" min="1" max="20" value="${state.strokeWidth}" style="width:70px" id="sw"/>`);
      p.appendChild(r1); p.appendChild(r2);
      r1.querySelector('#sc').oninput=e=>state.strokeColor=e.target.value;
      r2.querySelector('#sw').oninput=e=>state.strokeWidth=+e.target.value||1;
    } else if (state.tool==='redact') {
      const r=row('Fill',`<input type="color" value="${state.redactColor}" id="rc"/>`);
      p.appendChild(r); r.querySelector('#rc').oninput=e=>state.redactColor=e.target.value;
    } else if (state.tool==='image') {
      const b=document.createElement('button'); b.className='btn-ghost px-3 py-2 rounded-lg text-sm w-full'; b.textContent=state.imageData?'Change image':'Choose image…';
      b.onclick=()=>pickImage(false); p.appendChild(b);
      if (state.imageData){ const prev=document.createElement('img'); prev.src=state.imageData; prev.className='mt-2 rounded-lg border border-brd max-h-24 object-contain'; p.appendChild(prev); }
    } else if (state.tool==='signature') {
      const b=document.createElement('button'); b.className='btn-ghost px-3 py-2 rounded-lg text-sm w-full'; b.textContent='Draw signature…';
      b.onclick=openSignaturePad; p.appendChild(b);
      if (state.imageData){ const prev=document.createElement('img'); prev.src=state.imageData; prev.className='mt-2 rounded-lg border border-brd bg-white max-h-24 object-contain'; p.appendChild(prev); }
    } else {
      p.appendChild(Object.assign(document.createElement('div'),{className:'text-muted text-[12px]',textContent:'Pilih tool untuk melihat pengaturan.'}));
    }
    // annotation count
    const counts=document.createElement('div'); counts.className='text-[12px] text-muted mt-2 pt-3 border-t border-brd';
    const total=Object.values(state.annos).reduce((a,b)=>a+b.length,0);
    counts.textContent=`${total} annotation${total===1?'':'s'} total`;
    p.appendChild(counts);
    return p;
  }

  function buildThumbs() {
    const c=document.createElement('div'); c.className='flex flex-col gap-2 max-h-[70vh] overflow-y-auto pr-1';
    for (let i=0;i<state.pageCount;i++) {
      const d=document.createElement('div'); d.className='edit-page-thumb'+(i===state.pageIndex?' active':'');
      const cv=document.createElement('canvas'); cv.width=110; cv.height=Math.round(110*state.pageSizes[i].h/state.pageSizes[i].w);
      d.appendChild(cv); const n=document.createElement('div'); n.className='num'; n.textContent=i+1; d.appendChild(n);
      c.appendChild(d);
      state.pdfjs.getPage(i+1).then(p=>{const s=110/p.getViewport({scale:1}).width; p.render({canvasContext:cv.getContext('2d'),viewport:p.getViewport({scale:s})});});
      d.onclick=()=>{ state.pageIndex=i; state.selectedId=null; renderStage(); c.querySelectorAll('.edit-page-thumb').forEach((x,j)=>x.classList.toggle('active',j===i)); };
    }
    return c;
  }

  function getSelected(){ const arr=state.annos[state.pageIndex]||[]; return arr.find(a=>a.id===state.selectedId); }

  async function renderStage() {
    const wrap=document.getElementById('stage-wrap'); wrap.innerHTML='';
    const stage=document.createElement('div'); stage.className='edit-stage'; wrap.appendChild(stage);
    const page=await state.pdfjs.getPage(state.pageIndex+1);
    const maxW=Math.min(820, wrap.clientWidth||820);
    const s=maxW/page.getViewport({scale:1}).width;
    state.scale=s;
    const vp=page.getViewport({scale:s});
    const cv=document.createElement('canvas'); cv.width=vp.width; cv.height=vp.height;
    stage.appendChild(cv);
    await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    const ov=document.createElement('div'); ov.className='edit-overlay'; ov.id='overlay'; stage.appendChild(ov);
    bindStage(ov, cv.width, cv.height);
    renderOverlay();
  }

  function renderOverlay() {
    const ov=document.getElementById('overlay'); if(!ov) return;
    ov.innerHTML='';
    const s=state.scale;
    const arr=state.annos[state.pageIndex]||[];
    for (const a of arr) {
      const el=document.createElement('div'); el.className='anno'; el.dataset.id=a.id;
      el.style.left=(a.x*s)+'px'; el.style.top=(a.y*s)+'px';
      el.style.width=(a.w*s)+'px'; el.style.height=(a.h*s)+'px';
      if (a.id===state.selectedId) el.classList.add('selected');
      if (a.type==='text') {
        el.classList.add('anno-text');
        el.style.color=a.color; el.style.fontSize=(a.size*s)+'px';
        el.style.fontFamily='Inter, sans-serif';
        el.textContent=a.text;
      } else if (a.type==='image'||a.type==='signature') {
        el.classList.add('anno-img');
        const img=document.createElement('img'); img.src=a.src; el.appendChild(img);
      } else if (a.type==='highlight') {
        el.style.background=a.color; el.style.opacity='0.4';
      } else if (a.type==='redact') {
        el.style.background=a.color;
      } else if (a.type==='rect') {
        el.style.border=`${Math.max(1,a.width*s)}px solid ${a.color}`;
      } else if (a.type==='line'||a.type==='arrow') {
        el.innerHTML='';
        const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
        svg.setAttribute('width',(a.w*s)); svg.setAttribute('height',(a.h*s));
        svg.style.overflow='visible';
        const x1=(a.x1-a.x)*s, y1=(a.y1-a.y)*s, x2=(a.x2-a.x)*s, y2=(a.y2-a.y)*s;
        const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
        ln.setAttribute('x1',x1); ln.setAttribute('y1',y1); ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
        ln.setAttribute('stroke',a.color); ln.setAttribute('stroke-width',Math.max(1,a.width*s)); ln.setAttribute('stroke-linecap','round');
        svg.appendChild(ln);
        if (a.type==='arrow') {
          const ang=Math.atan2(y2-y1,x2-x1); const len=12+a.width*s;
          for (const off of [Math.PI-0.5,Math.PI+0.5]) {
            const hx=x2+Math.cos(ang+off)*len, hy=y2+Math.sin(ang+off)*len;
            const h=document.createElementNS('http://www.w3.org/2000/svg','line');
            h.setAttribute('x1',x2); h.setAttribute('y1',y2); h.setAttribute('x2',hx); h.setAttribute('y2',hy);
            h.setAttribute('stroke',a.color); h.setAttribute('stroke-width',Math.max(1,a.width*s)); h.setAttribute('stroke-linecap','round');
            svg.appendChild(h);
          }
        }
        el.appendChild(svg);
      }
      // selection controls
      if (a.id===state.selectedId) {
        const close=document.createElement('div'); close.className='anno-close'; close.textContent='×';
        close.onclick=ev=>{ ev.stopPropagation(); deleteSelected(); };
        el.appendChild(close);
        if (a.type!=='line'&&a.type!=='arrow') {
          const h=document.createElement('div'); h.className='anno-handle';
          h.addEventListener('pointerdown', ev=>startResize(ev,a));
          el.appendChild(h);
        }
      }
      el.addEventListener('pointerdown', ev=>{
        if (state.tool!=='select') return;
        if (ev.target.classList.contains('anno-handle')||ev.target.classList.contains('anno-close')) return;
        state.selectedId=a.id; renderOverlay(); startDrag(ev,a);
      });
      ov.appendChild(el);
    }
  }

  function startDrag(ev, a) {
    ev.preventDefault();
    const s=state.scale; const sx=ev.clientX, sy=ev.clientY;
    const ox=a.x, oy=a.y;
    const move=e=>{ const dx=(e.clientX-sx)/s, dy=(e.clientY-sy)/s;
      const {w:pw,h:ph}=state.pageSizes[state.pageIndex];
      a.x=Math.max(0,Math.min(pw-a.w,ox+dx)); a.y=Math.max(0,Math.min(ph-a.h,oy+dy));
      if (a.type==='line'||a.type==='arrow') { a.x1=a.x; a.y1=a.y; a.x2=a.x+a.w; a.y2=a.y+a.h; }
      renderOverlay();
    };
    const up=()=>{ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); };
    window.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
  }
  function startResize(ev, a) {
    ev.preventDefault(); ev.stopPropagation();
    const s=state.scale; const sx=ev.clientX, sy=ev.clientY;
    const ow=a.w, oh=a.h; const ratio = (a.type==='image'||a.type==='signature')? oh/ow : null;
    const move=e=>{ let nw=Math.max(10,ow+(e.clientX-sx)/s); let nh=Math.max(10,oh+(e.clientY-sy)/s);
      if (ratio) nh=nw*ratio;
      if (a.type==='text') { a.size=Math.max(6, a.size*(nw/ow)); }
      a.w=nw; a.h=nh; renderOverlay();
    };
    const up=()=>{ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); };
    window.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
  }
  function deleteSelected(){
    const arr=state.annos[state.pageIndex]||[]; const i=arr.findIndex(x=>x.id===state.selectedId);
    if (i>-1){ arr.splice(i,1); state.selectedId=null; renderOverlay(); mount(); }
  }

  function bindStage(ov, W, H) {
    const s=state.scale;
    ov.addEventListener('pointerdown', ev=>{
      if (ev.target!==ov) return;
      const rect=ov.getBoundingClientRect();
      const px=(ev.clientX-rect.left)/s, py=(ev.clientY-rect.top)/s;
      const id=Date.now()+'-'+Math.random().toString(36).slice(2,7);
      if (state.tool==='select') { state.selectedId=null; renderOverlay(); return; }
      if (state.tool==='text') {
        const text=prompt('Text:','Sample text'); if(!text) return;
        const a={id,type:'text',text,x:px,y:py,size:state.textSize,color:state.textColor};
        // measure approx
        a.w=Math.max(40,text.length*state.textSize*0.55); a.h=state.textSize*1.3;
        state.annos[state.pageIndex].push(a); state.selectedId=id; state.tool='select'; mount(); return;
      }
      if (state.tool==='image'||state.tool==='signature') {
        if (!state.imageData) { toast('Pilih gambar dulu','error'); return; }
        const iw=state.imageDims.w, ih=state.imageDims.h;
        const w=Math.min(200, state.pageSizes[state.pageIndex].w/3);
        const h=w*(ih/iw);
        const a={id,type:state.tool,src:state.imageData,x:px,y:py,w,h};
        state.annos[state.pageIndex].push(a); state.selectedId=id; state.tool='select'; mount(); return;
      }
      // drag-shape tools
      const startX=px, startY=py;
      let a;
      if (state.tool==='highlight') a={id,type:'highlight',x:px,y:py,w:1,h:1,color:state.highlightColor};
      else if (state.tool==='redact') a={id,type:'redact',x:px,y:py,w:1,h:1,color:state.redactColor};
      else if (state.tool==='rect') a={id,type:'rect',x:px,y:py,w:1,h:1,color:state.strokeColor,width:state.strokeWidth};
      else if (state.tool==='line'||state.tool==='arrow') a={id,type:state.tool,x:px,y:py,w:1,h:1,x1:px,y1:py,x2:px,y2:py,color:state.strokeColor,width:state.strokeWidth};
      else return;
      state.annos[state.pageIndex].push(a);
      const move=e=>{
        const nx=(e.clientX-rect.left)/s, ny=(e.clientY-rect.top)/s;
        if (a.type==='line'||a.type==='arrow') {
          a.x2=nx; a.y2=ny;
          a.x=Math.min(startX,nx); a.y=Math.min(startY,ny);
          a.w=Math.max(1,Math.abs(nx-startX)); a.h=Math.max(1,Math.abs(ny-startY));
        } else {
          a.x=Math.min(startX,nx); a.y=Math.min(startY,ny);
          a.w=Math.max(1,Math.abs(nx-startX)); a.h=Math.max(1,Math.abs(ny-startY));
        }
        renderOverlay();
      };
      const up=()=>{ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up);
        if (a.w<3&&a.h<3){ state.annos[state.pageIndex].pop(); }
        else { state.selectedId=a.id; state.tool='select'; mount(); }
      };
      window.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
    });
    ov.addEventListener('keydown', ev=>{ if((ev.key==='Delete'||ev.key==='Backspace')&&state.selectedId) deleteSelected(); });
  }

  function pickImage(isSig) {
    const inp=document.createElement('input'); inp.type='file'; inp.accept='image/png,image/jpeg';
    inp.onchange=()=>{
      const f=inp.files[0]; if(!f) return;
      const r=new FileReader(); r.onload=()=>{
        state.imageData=r.result;
        const im=new Image(); im.onload=()=>{ state.imageDims={w:im.width,h:im.height}; mount(); }; im.src=r.result;
      }; r.readAsDataURL(f);
    };
    inp.click();
  }

  function openSignaturePad() {
    const mask=document.createElement('div'); mask.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:60;display:flex;align-items:center;justify-content:center;';
    const box=document.createElement('div'); box.className='card p-5'; box.style.width='520px';
    box.innerHTML=`<div class="text-base font-semibold mb-3">Draw signature</div>
      <canvas id="sigpad" width="480" height="200" style="background:white;border-radius:8px;cursor:crosshair;display:block;"></canvas>
      <div class="flex justify-between mt-4"><button id="sigclr" class="btn-ghost px-4 py-2 rounded-lg text-sm">Clear</button>
      <div class="flex gap-2"><button id="sigcnl" class="btn-ghost px-4 py-2 rounded-lg text-sm">Cancel</button>
      <button id="sigok" class="btn-primary px-4 py-2 rounded-lg text-sm">Use signature</button></div></div>`;
    mask.appendChild(box); document.body.appendChild(mask);
    const cv=box.querySelector('#sigpad'); const ctx=cv.getContext('2d');
    ctx.strokeStyle='#111'; ctx.lineWidth=2.4; ctx.lineCap='round'; ctx.lineJoin='round';
    let drawing=false, last=null, any=false;
    const pos=e=>{const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top};};
    cv.addEventListener('pointerdown',e=>{drawing=true;last=pos(e);});
    cv.addEventListener('pointermove',e=>{ if(!drawing) return; const p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; any=true; });
    window.addEventListener('pointerup',()=>drawing=false);
    box.querySelector('#sigclr').onclick=()=>{ctx.clearRect(0,0,cv.width,cv.height); any=false;};
    box.querySelector('#sigcnl').onclick=()=>mask.remove();
    box.querySelector('#sigok').onclick=()=>{
      if(!any){ toast('Signature is empty','error'); return; }
      // trim to content to get tighter bounds
      const data=ctx.getImageData(0,0,cv.width,cv.height).data;
      let minX=cv.width,minY=cv.height,maxX=0,maxY=0;
      for(let y=0;y<cv.height;y++)for(let x=0;x<cv.width;x++){ const a=data[(y*cv.width+x)*4+3]; if(a>0){ if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; } }
      const pad=6; minX=Math.max(0,minX-pad); minY=Math.max(0,minY-pad); maxX=Math.min(cv.width,maxX+pad); maxY=Math.min(cv.height,maxY+pad);
      const w=maxX-minX, h=maxY-minY;
      const out=document.createElement('canvas'); out.width=w; out.height=h;
      out.getContext('2d').drawImage(cv,minX,minY,w,h,0,0,w,h);
      state.imageData=out.toDataURL('image/png');
      state.imageDims={w,h};
      mask.remove(); mount();
    };
  }

  function hexRgb(hex){ const m=hex.replace('#','').match(/.{2}/g).map(x=>parseInt(x,16)/255); return rgb(m[0],m[1],m[2]); }

  async function doSave() {
    const proc=processingPanel('Saving PDF…'); view.innerHTML=''; view.appendChild(proc);
    try {
      const doc=await PDFDocument.load(state.buf);
      const font=await doc.embedFont(StandardFonts.Helvetica);
      const pages=doc.getPages();
      // pre-embed images
      const imgCache=new Map();
      const embedImg=async(dataUrl)=>{
        if (imgCache.has(dataUrl)) return imgCache.get(dataUrl);
        const bin=atob(dataUrl.split(',')[1]); const arr=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
        const embed = dataUrl.startsWith('data:image/png') ? await doc.embedPng(arr) : await doc.embedJpg(arr);
        imgCache.set(dataUrl, embed); return embed;
      };
      for (let i=0;i<pages.length;i++) {
        const p=pages[i]; const {height:ph}=p.getSize();
        const list=state.annos[i]||[];
        for (const a of list) {
          const y = ph - a.y - a.h; // convert top-left to bottom-left
          if (a.type==='text') {
            p.drawText(a.text, { x:a.x, y: ph - a.y - a.size, size:a.size, font, color:hexRgb(a.color) });
          } else if (a.type==='image'||a.type==='signature') {
            const im=await embedImg(a.src);
            p.drawImage(im, { x:a.x, y, width:a.w, height:a.h });
          } else if (a.type==='highlight') {
            p.drawRectangle({ x:a.x, y, width:a.w, height:a.h, color:hexRgb(a.color), opacity:0.4 });
          } else if (a.type==='redact') {
            p.drawRectangle({ x:a.x, y, width:a.w, height:a.h, color:hexRgb(a.color) });
          } else if (a.type==='rect') {
            p.drawRectangle({ x:a.x, y, width:a.w, height:a.h, borderColor:hexRgb(a.color), borderWidth:a.width });
          } else if (a.type==='line'||a.type==='arrow') {
            const sx=a.x1, sy=ph-a.y1, ex=a.x2, ey=ph-a.y2;
            p.drawLine({ start:{x:sx,y:sy}, end:{x:ex,y:ey}, thickness:a.width, color:hexRgb(a.color) });
            if (a.type==='arrow') {
              const ang=Math.atan2(ey-sy,ex-sx); const len=10+a.width*2;
              for (const off of [Math.PI-0.5, Math.PI+0.5]) {
                const hx=ex+Math.cos(ang+off)*len, hy=ey+Math.sin(ang+off)*len;
                p.drawLine({ start:{x:ex,y:ey}, end:{x:hx,y:hy}, thickness:a.width, color:hexRgb(a.color) });
              }
            }
          }
        }
      }
      const bytes=await doc.save(); const blob=new Blob([bytes],{type:'application/pdf'});
      view.innerHTML=''; view.appendChild(successPanel({ message:'Edited PDF ready', filename:(state.file.name.replace(/\.pdf$/i,'')||'edited')+'-edited.pdf', blob, onReset:renderEdit }));
    } catch(e) { console.error(e); toast('Save failed: '+e.message,'error'); mount(); }
  }

  // global delete key
  const keyH=e=>{ if((e.key==='Delete'||e.key==='Backspace')&&state.selectedId&&active==='edit'&&document.activeElement.tagName!=='INPUT'){ deleteSelected(); } };
  document.addEventListener('keydown', keyH);

  mount();
}

/* ---------- PROTECT ---------- */
function renderProtect() {
  const state = { file:null, buf:null, pdfjs:null };
  const root=document.createElement('div'); root.className='flex flex-col gap-6'; view.appendChild(root);
  const dz=dropzone({ multiple:false, onFiles: async files => {
    const f=files[0]; const err=validatePdf(f); if(err){toast(err,'error');return;}
    try { state.file=f; state.buf=await f.arrayBuffer(); state.pdfjs=await loadPdfJs(state.buf); mount(); }
    catch { toast('Could not read PDF (already password-protected?)','error'); }
  }, hint:'Drop PDF here to protect or click to browse' });

  function mount() {
    root.innerHTML='';
    if (!state.buf) { root.appendChild(dz); return; }
    root.appendChild(fileMeta(state.file.name, state.file.size, state.pdfjs.numPages));

    const panel=document.createElement('div'); panel.className='card p-6 grid gap-4 md:grid-cols-2';
    panel.innerHTML=`
      <div class="flex flex-col gap-1">
        <label class="text-[13px] text-muted">User password (open document)</label>
        <input id="up" type="text" placeholder="Required" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[13px] text-muted">Owner password (permissions)</label>
        <input id="op" type="text" placeholder="Optional — same as user if empty" />
      </div>
      <div class="md:col-span-2">
        <div class="text-[13px] text-muted mb-2">Permissions (when opened with user password)</div>
        <div class="flex flex-wrap gap-2">
          <label class="chip flex items-center gap-2"><input type="checkbox" id="p-print" checked> Print</label>
          <label class="chip flex items-center gap-2"><input type="checkbox" id="p-copy" checked> Copy text</label>
          <label class="chip flex items-center gap-2"><input type="checkbox" id="p-mod"> Modify</label>
          <label class="chip flex items-center gap-2"><input type="checkbox" id="p-annot" checked> Annotate</label>
        </div>
      </div>`;
    root.appendChild(panel);

    const bar=document.createElement('div'); bar.className='flex items-center justify-between';
    const note=document.createElement('div'); note.className='text-[12px] text-muted';
    note.textContent='Uses AES-128 encryption. Simpan password Anda — file terenkripsi tidak dapat dibuka tanpa itu.';
    bar.appendChild(note);
    const go=document.createElement('button'); go.className='btn-primary px-5 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2';
    go.innerHTML=`${icons.lock} Protect PDF`; go.onclick=doProtect;
    bar.appendChild(go); root.appendChild(bar);
  }

  async function doProtect() {
    const up=root.querySelector('#up').value.trim();
    const op=root.querySelector('#op').value.trim();
    if (!up) { toast('User password is required','error'); return; }
    const perms={
      printing: root.querySelector('#p-print').checked ? 'highResolution' : false,
      copying: root.querySelector('#p-copy').checked,
      modifying: root.querySelector('#p-mod').checked,
      annotating: root.querySelector('#p-annot').checked,
      fillingForms: true, contentAccessibility: true, documentAssembly: root.querySelector('#p-mod').checked,
    };
    const proc=processingPanel('Encrypting…'); view.innerHTML=''; view.appendChild(proc);
    try {
      const doc=await PDFDocument.load(state.buf, { ignoreEncryption:true });
      if (typeof doc.encrypt !== 'function') throw new Error('Encryption not supported by loaded pdf-lib build');
      doc.encrypt({ userPassword: up, ownerPassword: op || up, permissions: perms });
      const bytes=await doc.save({ useObjectStreams:false });
      const blob=new Blob([bytes], { type:'application/pdf' });
      view.innerHTML='';
      view.appendChild(successPanel({ message:'PDF encrypted', filename:(state.file.name.replace(/\.pdf$/i,'')||'document')+'-protected.pdf', blob, onReset:renderProtect }));
    } catch(e) { console.error(e); toast('Failed to encrypt: '+e.message,'error'); mount(); }
  }
  mount();
}

/* ---------- CROP ---------- */
function renderCrop() {
  const state = { file:null, buf:null, pdfjs:null, top:5, right:5, bottom:5, left:5, previewPage:1 };
  const root=document.createElement('div'); root.className='flex flex-col gap-6'; view.appendChild(root);
  const dz=dropzone({ multiple:false, onFiles: async files => {
    const f=files[0]; const err=validatePdf(f); if(err){toast(err,'error');return;}
    try { state.file=f; state.buf=await f.arrayBuffer(); state.pdfjs=await loadPdfJs(state.buf); mount(); }
    catch { toast('Could not read PDF','error'); }
  }, hint:'Drop PDF here to crop or click to browse' });

  function mount() {
    root.innerHTML='';
    if (!state.buf) { root.appendChild(dz); return; }
    root.appendChild(fileMeta(state.file.name, state.file.size, state.pdfjs.numPages));

    const grid=document.createElement('div'); grid.className='grid gap-4 md:grid-cols-[1fr_260px]';
    const previewWrap=document.createElement('div'); previewWrap.className='card p-4 flex items-center justify-center relative min-h-[300px]';
    previewWrap.innerHTML=`<div class="text-muted text-sm">Rendering preview…</div>`;
    grid.appendChild(previewWrap);

    const panel=document.createElement('div'); panel.className='card p-5 flex flex-col gap-3';
    panel.innerHTML=`
      <div class="text-[13px] font-medium">Margins to trim (% of page)</div>
      ${['top','right','bottom','left'].map(k=>`
        <div class="flex items-center gap-3">
          <label class="text-[12px] text-muted w-14 capitalize">${k}</label>
          <input type="range" min="0" max="40" step="0.5" value="${state[k]}" data-k="${k}" class="flex-1"/>
          <div class="text-[12px] w-10 text-right" data-v="${k}">${state[k]}%</div>
        </div>`).join('')}
      <div class="flex gap-2 mt-2">
        <button class="chip flex-1" data-preset="uniform">All equal</button>
        <button class="chip flex-1" data-preset="reset">Reset</button>
      </div>`;
    grid.appendChild(panel);
    root.appendChild(grid);

    panel.querySelectorAll('input[type=range]').forEach(inp=>{
      inp.oninput=()=>{ const k=inp.dataset.k; state[k]=+inp.value; panel.querySelector(`[data-v="${k}"]`).textContent=state[k]+'%'; drawPreview(); };
    });
    panel.querySelector('[data-preset="uniform"]').onclick=()=>{ const v=state.top; state.right=state.bottom=state.left=v; mount(); };
    panel.querySelector('[data-preset="reset"]').onclick=()=>{ state.top=state.right=state.bottom=state.left=5; mount(); };

    const bar=document.createElement('div'); bar.className='flex justify-end';
    const go=document.createElement('button'); go.className='btn-primary px-5 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2';
    go.innerHTML=`${icons.crop} Crop PDF`; go.onclick=doCrop;
    bar.appendChild(go); root.appendChild(bar);

    async function drawPreview() {
      const cv=await renderThumb(state.pdfjs, 0, 360);
      previewWrap.innerHTML='';
      const box=document.createElement('div'); box.style.position='relative'; box.style.display='inline-block';
      box.appendChild(cv);
      const ov=document.createElement('div');
      Object.assign(ov.style,{position:'absolute',border:'2px dashed #3B82F6',background:'rgba(59,130,246,.08)',
        top:state.top+'%',left:state.left+'%',right:state.right+'%',bottom:state.bottom+'%'});
      box.appendChild(ov); previewWrap.appendChild(box);
    }
    drawPreview();
  }

  async function doCrop() {
    if (state.top+state.bottom>=95 || state.left+state.right>=95) { toast('Margins too large','error'); return; }
    const proc=processingPanel('Cropping…'); view.innerHTML=''; view.appendChild(proc);
    try {
      const doc=await PDFDocument.load(state.buf);
      doc.getPages().forEach(p=>{
        const {width,height}=p.getSize();
        const l=width*state.left/100, r=width*state.right/100;
        const t=height*state.top/100, b=height*state.bottom/100;
        // PDF coord: origin bottom-left. Crop box (x, y, w, h)
        p.setCropBox(l, b, width-l-r, height-t-b);
      });
      const bytes=await doc.save();
      const blob=new Blob([bytes],{type:'application/pdf'});
      view.innerHTML='';
      view.appendChild(successPanel({ message:'PDF cropped', filename:(state.file.name.replace(/\.pdf$/i,'')||'document')+'-cropped.pdf', blob, onReset:renderCrop }));
    } catch(e) { console.error(e); toast('Crop failed: '+e.message,'error'); mount(); }
  }
  mount();
}

/* ---------- RESIZE ---------- */
function renderResize() {
  const PAGE_SIZES = {
    A4:[595.28,841.89], Letter:[612,792], Legal:[612,1008], A3:[841.89,1190.55], A5:[419.53,595.28], Tabloid:[792,1224],
  };
  const state = { file:null, buf:null, pdfjs:null, mode:'preset', preset:'A4', scale:100, orient:'portrait', fit:'contain' };
  const root=document.createElement('div'); root.className='flex flex-col gap-6'; view.appendChild(root);
  const dz=dropzone({ multiple:false, onFiles: async files => {
    const f=files[0]; const err=validatePdf(f); if(err){toast(err,'error');return;}
    try { state.file=f; state.buf=await f.arrayBuffer(); state.pdfjs=await loadPdfJs(state.buf); mount(); }
    catch { toast('Could not read PDF','error'); }
  }, hint:'Drop PDF here to resize or click to browse' });

  function mount() {
    root.innerHTML='';
    if (!state.buf) { root.appendChild(dz); return; }
    root.appendChild(fileMeta(state.file.name, state.file.size, state.pdfjs.numPages));

    const tabs=document.createElement('div'); tabs.className='flex gap-2';
    ['preset','scale'].forEach(m=>{
      const b=document.createElement('button'); b.className='chip'+(state.mode===m?' active':'');
      b.textContent=m==='preset'?'Change page size':'Scale percentage';
      b.onclick=()=>{ state.mode=m; mount(); }; tabs.appendChild(b);
    });
    root.appendChild(tabs);

    const panel=document.createElement('div'); panel.className='card p-5 grid gap-4 md:grid-cols-2';
    if (state.mode==='preset') {
      panel.innerHTML=`
        <div class="flex flex-col gap-1">
          <label class="text-[13px] text-muted">Page size</label>
          <select id="preset">${Object.keys(PAGE_SIZES).map(k=>`<option value="${k}" ${state.preset===k?'selected':''}>${k}</option>`).join('')}</select>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-[13px] text-muted">Orientation</label>
          <select id="orient"><option value="portrait" ${state.orient==='portrait'?'selected':''}>Portrait</option><option value="landscape" ${state.orient==='landscape'?'selected':''}>Landscape</option></select>
        </div>
        <div class="md:col-span-2 flex flex-col gap-1">
          <label class="text-[13px] text-muted">Fit content</label>
          <div class="flex gap-2">
            <button class="chip ${state.fit==='contain'?'active':''}" data-fit="contain">Contain (fit inside)</button>
            <button class="chip ${state.fit==='cover'?'active':''}" data-fit="cover">Cover (fill)</button>
            <button class="chip ${state.fit==='stretch'?'active':''}" data-fit="stretch">Stretch</button>
          </div>
        </div>`;
      panel.querySelector('#preset').onchange=e=>{ state.preset=e.target.value; };
      panel.querySelector('#orient').onchange=e=>{ state.orient=e.target.value; };
      panel.querySelectorAll('[data-fit]').forEach(b=>b.onclick=()=>{ state.fit=b.dataset.fit; mount(); });
    } else {
      panel.innerHTML=`
        <div class="md:col-span-2 flex flex-col gap-2">
          <label class="text-[13px] text-muted">Scale (%)</label>
          <div class="flex items-center gap-3">
            <input type="range" min="10" max="200" step="5" value="${state.scale}" id="sc" class="flex-1"/>
            <div class="text-sm w-14 text-right" id="scv">${state.scale}%</div>
          </div>
          <div class="text-[12px] text-muted">50% halves each dimension. 200% doubles it.</div>
        </div>`;
      const sc=panel.querySelector('#sc'), scv=panel.querySelector('#scv');
      sc.oninput=()=>{ state.scale=+sc.value; scv.textContent=state.scale+'%'; };
    }
    root.appendChild(panel);

    const bar=document.createElement('div'); bar.className='flex justify-end';
    const go=document.createElement('button'); go.className='btn-primary px-5 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2';
    go.innerHTML=`${icons.resize} Resize PDF`; go.onclick=doResize;
    bar.appendChild(go); root.appendChild(bar);
  }

  async function doResize() {
    const proc=processingPanel('Resizing…'); view.innerHTML=''; view.appendChild(proc);
    try {
      const src=await PDFDocument.load(state.buf);
      const out=await PDFDocument.create();
      const pages=src.getPages();
      const embedded=await out.embedPages(pages);
      embedded.forEach((emb,i)=>{
        const src=pages[i].getSize();
        let tw, th;
        if (state.mode==='preset') {
          let [w,h]=PAGE_SIZES[state.preset];
          if (state.orient==='landscape') [w,h]=[h,w];
          tw=w; th=h;
        } else {
          const s=state.scale/100; tw=src.width*s; th=src.height*s;
        }
        const p=out.addPage([tw,th]);
        let sx=1, sy=1, ox=0, oy=0;
        if (state.mode==='scale') { sx=sy=state.scale/100; }
        else if (state.fit==='stretch') { sx=tw/src.width; sy=th/src.height; }
        else if (state.fit==='contain') { sx=sy=Math.min(tw/src.width, th/src.height); ox=(tw-src.width*sx)/2; oy=(th-src.height*sy)/2; }
        else { sx=sy=Math.max(tw/src.width, th/src.height); ox=(tw-src.width*sx)/2; oy=(th-src.height*sy)/2; }
        p.drawPage(emb, { x:ox, y:oy, xScale:sx, yScale:sy });
      });
      const bytes=await out.save();
      const blob=new Blob([bytes],{type:'application/pdf'});
      view.innerHTML='';
      view.appendChild(successPanel({ message:'PDF resized', filename:(state.file.name.replace(/\.pdf$/i,'')||'document')+'-resized.pdf', blob, onReset:renderResize }));
    } catch(e) { console.error(e); toast('Resize failed: '+e.message,'error'); mount(); }
  }
  mount();
}

/* ---------- QR CODE STAMP ---------- */
function makeQRCanvas(text, ec='M', targetSize=512) {
  const qr = qrcode(0, ec);
  qr.addData(text);
  qr.make();
  const count = qr.getModuleCount();
  const cell = Math.max(1, Math.floor(targetSize / (count + 2)));
  const margin = cell;
  const dim = cell*count + margin*2;
  const cv = document.createElement('canvas');
  cv.width = dim; cv.height = dim;
  const ctx = cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,dim,dim);
  ctx.fillStyle='#000';
  for (let r=0;r<count;r++) for (let c=0;c<count;c++)
    if (qr.isDark(r,c)) ctx.fillRect(margin+c*cell, margin+r*cell, cell, cell);
  return cv;
}
function renderQR() {
  const state = { file:null, buf:null, pdfjs:null, text:'https://example.com', size:80, pos:'br', margin:24, pages:'all', custom:'', ec:'M' };
  const root=document.createElement('div'); root.className='flex flex-col gap-6'; view.appendChild(root);
  const dz=dropzone({ multiple:false, onFiles: async files => {
    const f=files[0]; const err=validatePdf(f); if(err){toast(err,'error');return;}
    try { state.file=f; state.buf=await f.arrayBuffer(); state.pdfjs=await loadPdfJs(state.buf); mount(); }
    catch { toast('Could not read PDF','error'); }
  }, hint:'Drop PDF here to stamp QR or click to browse' });

  const POS = { tl:'Top-Left', tc:'Top-Center', tr:'Top-Right', bl:'Bottom-Left', bc:'Bottom-Center', br:'Bottom-Right' };

  function mount() {
    root.innerHTML='';
    if (!state.buf) { root.appendChild(dz); return; }
    root.appendChild(fileMeta(state.file.name, state.file.size, state.pdfjs.numPages));

    const grid=document.createElement('div'); grid.className='grid gap-4 md:grid-cols-[1fr_320px]';
    const previewWrap=document.createElement('div'); previewWrap.className='card p-4 flex items-center justify-center min-h-[320px]';
    grid.appendChild(previewWrap);

    const panel=document.createElement('div'); panel.className='card p-5 flex flex-col gap-3';
    panel.innerHTML=`
      <div class="flex flex-col gap-1">
        <label class="text-[13px] text-muted">Text / URL</label>
        <input id="qt" type="text" value="${state.text.replace(/"/g,'&quot;')}"/>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[13px] text-muted">Error correction</label>
        <select id="ec">${['L','M','Q','H'].map(v=>`<option value="${v}" ${state.ec===v?'selected':''}>${v}</option>`).join('')}</select>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[13px] text-muted">Size: <span id="sv">${state.size}pt</span></label>
        <input type="range" id="sz" min="40" max="200" step="4" value="${state.size}"/>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[13px] text-muted">Margin from edge: <span id="mv">${state.margin}pt</span></label>
        <input type="range" id="mg" min="0" max="80" step="2" value="${state.margin}"/>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[13px] text-muted">Position</label>
        <div class="grid grid-cols-3 gap-1" id="posgrid">
          ${Object.entries(POS).map(([k,v])=>`<button class="chip ${state.pos===k?'active':''}" data-p="${k}" title="${v}">${v.split('-').map(w=>w[0]).join('')}</button>`).join('')}
        </div>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[13px] text-muted">Apply to</label>
        <select id="pg"><option value="all" ${state.pages==='all'?'selected':''}>All pages</option><option value="first" ${state.pages==='first'?'selected':''}>First page only</option><option value="last" ${state.pages==='last'?'selected':''}>Last page only</option><option value="custom" ${state.pages==='custom'?'selected':''}>Custom range…</option></select>
        <input id="pgc" type="text" placeholder="e.g. 1-3,5" value="${state.custom}" class="${state.pages==='custom'?'':'hidden'}"/>
      </div>`;
    grid.appendChild(panel);
    root.appendChild(grid);

    panel.querySelector('#qt').oninput=e=>{ state.text=e.target.value; drawPreview(); };
    panel.querySelector('#ec').onchange=e=>{ state.ec=e.target.value; drawPreview(); };
    panel.querySelector('#sz').oninput=e=>{ state.size=+e.target.value; panel.querySelector('#sv').textContent=state.size+'pt'; drawPreview(); };
    panel.querySelector('#mg').oninput=e=>{ state.margin=+e.target.value; panel.querySelector('#mv').textContent=state.margin+'pt'; drawPreview(); };
    panel.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>{ state.pos=b.dataset.p; mount(); });
    panel.querySelector('#pg').onchange=e=>{ state.pages=e.target.value; mount(); };
    panel.querySelector('#pgc').oninput=e=>{ state.custom=e.target.value; };

    const bar=document.createElement('div'); bar.className='flex justify-end';
    const go=document.createElement('button'); go.className='btn-primary px-5 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2';
    go.innerHTML=`${icons.qr} Stamp QR Code`; go.onclick=doStamp;
    bar.appendChild(go); root.appendChild(bar);

    async function drawPreview() {
      try {
        const cv=await renderThumb(state.pdfjs, 0, 360);
        previewWrap.innerHTML='';
        const box=document.createElement('div'); box.style.position='relative'; box.style.display='inline-block';
        box.appendChild(cv);
        // QR overlay
        const qrCv=makeQRCanvas(state.text||' ', state.ec, 240);
        const page=await state.pdfjs.getPage(1);
        const vp=page.getViewport({scale:1});
        const scale=cv.width/vp.width;
        const s=state.size*scale, m=state.margin*scale;
        const style={position:'absolute',width:s+'px',height:s+'px',background:'white',padding:'2px',boxSizing:'border-box'};
        if (state.pos.startsWith('t')) style.top=m+'px'; else style.bottom=m+'px';
        if (state.pos.endsWith('l')) style.left=m+'px';
        else if (state.pos.endsWith('r')) style.right=m+'px';
        else { style.left='50%'; style.transform='translateX(-50%)'; }
        Object.assign(qrCv.style, style);
        qrCv.style.width=s+'px'; qrCv.style.height=s+'px';
        box.appendChild(qrCv); previewWrap.appendChild(box);
      } catch(e) { previewWrap.innerHTML=`<div class="text-red-400 text-sm">${e.message}</div>`; }
    }
    drawPreview();
  }

  function parseRange(str, total) {
    const set=new Set();
    for (const part of str.split(',')) {
      const s=part.trim(); if(!s) continue;
      const m=s.match(/^(\d+)(?:-(\d+))?$/); if (!m) continue;
      const a=+m[1], b=m[2]?+m[2]:a;
      for (let i=Math.min(a,b); i<=Math.max(a,b); i++) if (i>=1&&i<=total) set.add(i-1);
    }
    return [...set];
  }

  async function doStamp() {
    if (!state.text.trim()) { toast('QR content required','error'); return; }
    const proc=processingPanel('Stamping QR…'); view.innerHTML=''; view.appendChild(proc);
    try {
      const doc=await PDFDocument.load(state.buf);
      const pages=doc.getPages();
      let indices=[];
      if (state.pages==='all') indices=pages.map((_,i)=>i);
      else if (state.pages==='first') indices=[0];
      else if (state.pages==='last') indices=[pages.length-1];
      else indices=parseRange(state.custom, pages.length);
      if (!indices.length) { toast('No pages selected','error'); mount(); return; }

      const qrCv=makeQRCanvas(state.text, state.ec, 640);
      const dataUrl=qrCv.toDataURL('image/png');
      const bin=atob(dataUrl.split(',')[1]);
      const arr=new Uint8Array(bin.length); for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
      const png=await doc.embedPng(arr);

      indices.forEach(idx=>{
        const p=pages[idx]; const {width,height}=p.getSize();
        const s=state.size, m=state.margin;
        let x, y;
        if (state.pos.endsWith('l')) x=m;
        else if (state.pos.endsWith('r')) x=width-s-m;
        else x=(width-s)/2;
        if (state.pos.startsWith('t')) y=height-s-m;
        else y=m;
        // white background pad
        p.drawRectangle({ x:x-2, y:y-2, width:s+4, height:s+4, color:rgb(1,1,1) });
        p.drawImage(png, { x, y, width:s, height:s });
      });

      const bytes=await doc.save();
      const blob=new Blob([bytes],{type:'application/pdf'});
      view.innerHTML='';
      view.appendChild(successPanel({ message:`QR added to ${indices.length} page${indices.length===1?'':'s'}`, filename:(state.file.name.replace(/\.pdf$/i,'')||'document')+'-qr.pdf', blob, onReset:renderQR }));
    } catch(e) { console.error(e); toast('Stamp failed: '+e.message,'error'); mount(); }
  }
  mount();
}

/* ---------- PWA / Offline ---------- */
(function setupPWA(){
  // Web app manifest via blob URL
  const manifest = {
    name:'PDF Toolkit', short_name:'PDF Toolkit', start_url:'.', display:'standalone',
    background_color:'#0A0A0A', theme_color:'#0A0A0A',
    description:'Client-side PDF toolkit — merge, split, edit, protect, and more.',
    icons:[
      { src:"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='36' fill='%233B82F6'/><path d='M60 40h50l32 32v80a12 12 0 0 1-12 12H60a12 12 0 0 1-12-12V52a12 12 0 0 1 12-12z' fill='white'/></svg>",
        sizes:'192x192', type:'image/svg+xml', purpose:'any' },
      { src:"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='96' fill='%233B82F6'/><path d='M160 106h134l86 86v214a32 32 0 0 1-32 32H160a32 32 0 0 1-32-32V138a32 32 0 0 1 32-32z' fill='white'/></svg>",
        sizes:'512x512', type:'image/svg+xml', purpose:'any' },
    ],
  };
  try {
    const blob=new Blob([JSON.stringify(manifest)], { type:'application/manifest+json' });
    const link=document.createElement('link'); link.rel='manifest'; link.href=URL.createObjectURL(blob);
    document.head.appendChild(link);
  } catch {}

  // Service worker (only when served over http/https; SW cannot register from file://)
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    const swSrc = `
      const CACHE='pdf-toolkit-v1';
      const ASSETS=[location.href.split('#')[0].split('?')[0]];
      self.addEventListener('install', e=>{ self.skipWaiting(); e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS).catch(()=>{}))); });
      self.addEventListener('activate', e=>{ e.waitUntil(self.clients.claim()); });
      self.addEventListener('fetch', e=>{
        if (e.request.method!=='GET') return;
        e.respondWith(
          caches.match(e.request).then(hit => hit || fetch(e.request).then(res=>{
            const copy=res.clone();
            if (res.ok && (e.request.url.startsWith('http'))) caches.open(CACHE).then(c=>c.put(e.request, copy)).catch(()=>{});
            return res;
          }).catch(()=>caches.match(ASSETS[0])))
        );
      });
    `;
    try {
      const swUrl=URL.createObjectURL(new Blob([swSrc], { type:'text/javascript' }));
      navigator.serviceWorker.register(swUrl).catch(()=>{});
    } catch {}
  }

  // Install prompt
  let deferred=null;
  window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferred=e; showInstall(); });
  function showInstall() {
    if (document.getElementById('install-btn')) return;
    const aside=document.querySelector('aside.sidebar'); if (!aside) return;
    const btn=document.createElement('button');
    btn.id='install-btn';
    btn.className='btn-primary text-[13px] font-medium px-3 py-2 rounded-lg flex items-center justify-center gap-2 mt-2';
    btn.innerHTML=`${icons.install}<span>Install App</span>`;
    btn.onclick=async()=>{ if(!deferred) return; deferred.prompt(); const {outcome}=await deferred.userChoice; if(outcome==='accepted'){ btn.remove(); toast('App installed','success'); } deferred=null; };
    aside.appendChild(btn);
  }
  window.addEventListener('appinstalled', ()=>{ const b=document.getElementById('install-btn'); if(b) b.remove(); toast('Installed to home screen','success'); });
})();

renderNav();
switchTool('merge');

/* Esc resets */
document.addEventListener('keydown', e => { if (e.key==='Escape') switchTool(active); });
</script>
